<style>

    --bg:#0B0F14; --bg-panel:#121821; --bg-card:#161D28; --ink:#EDEAE0; --muted:#8B93A1;

  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;overflow-x:hidden;}
  #app{max-width:980px;margin:0 auto;padding:0 20px 60px;overflow-x:hidden;}

  header.top h1 span{color:var(--gold);}
  .nav-right{display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);}

  .stipendija-chip{background:var(--bg-card);border:1px solid var(--gold);color:var(--gold);padding:5px 12px;border-radius:20px;font-weight:700;}
  .sync-status{cursor:default;font-size:14px;}

  .page-title{font-size:24px;margin:22px 0 4px;}
  .page-sub{color:var(--muted);font-size:13px;margin-bottom:20px;}

  .module-row{display:flex;gap:16px;align-items:flex-start;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:12px;cursor:pointer;transition:border-color .15s;}
  .module-row:hover{border-color:var(--gold);}
  .module-row.locked{opacity:.5;cursor:not-allowed;}
  .module-row.locked:hover{border-color:var(--border);}
  .module-badge-icon{font-size:28px;width:44px;text-align:center;flex-shrink:0;}
  .module-row h3{font-size:16.5px;margin-bottom:3px;}
  .module-row p{font-size:12.5px;color:var(--muted);margin:0 0 8px;}
  .module-meta{display:flex;gap:10px;align-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;}
  .tag{padding:3px 9px;border-radius:20px;}
  .tag-open{background:rgba(217,164,65,0.15);color:var(--gold);}
  .tag-done{background:rgba(63,167,150,0.15);color:var(--gain);}
  .tag-locked{background:var(--locked);color:var(--muted);}
  .mini-bar-track{width:100px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
  .mini-bar-fill{height:100%;background:var(--gold);}
  .stipendija-breakdown{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted);background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin:14px 0;}

  .back-link{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);cursor:pointer;display:inline-block;margin:18px 0 10px;}

  .topic-row:hover{border-color:var(--gold);}

  .score-cell{font-family:'JetBrains Mono',monospace;}

</style>

<!-- ============ FIREBASE (progreso saugojimui debesyje) ============ -->
<!-- Jei nenorite naudoti Firebase, tiesiog palikite firebaseConfig tuščią (null) -->
<!-- žemiau — programėlė automatiškai naudos tik šio įrenginio atmintį (localStorage). -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
/* ==========================================================================
   FIREBASE KONFIGŪRACIJA
   1. Eikite į https://console.firebase.google.com ir susikurkite nemokamą projektą
   2. Project settings (⚙️) → General → "Your apps" → pridėkite Web app (</>) 
   3. Nukopijuokite jums parodytą firebaseConfig objektą ir įklijuokite vietoj žemiau esančio
   4. Firestore Database skiltyje spauskite "Create database" (pasirinkite bet kurį regioną)
   5. Authentication skiltyje → Sign-in method → įjunkite "Anonymous"
   6. Firestore → Rules skiltyje įklijuokite taisykles iš pridėto README.md failo
   ========================================================================== */
const firebaseConfig = null; /* <-- ĮKLIJUOKITE SAVO firebaseConfig OBJEKTĄ ČIA, pvz.:
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "jusu-projektas.firebaseapp.com",
  projectId: "jusu-projektas",
  storageBucket: "jusu-projektas.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abcdef123456"
};
*/

let fbEnabled = false;
let fbUser = null;
let fbDb = null;

function setSyncStatus(state){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  if(state === 'offline') { el.textContent = '📴'; el.title = 'Offline — duomenys saugomi tik šiame įrenginyje'; }
  else if(state === 'syncing') { el.textContent = '🔄'; el.title = 'Sinchronizuojama...'; }
  else if(state === 'synced') { el.textContent = '☁️'; el.title = 'Progresas sinchronizuotas debesyje'; }
  else if(state === 'local') { el.textContent = '💾'; el.title = 'Saugoma tik šiame įrenginyje (Firebase neįjungtas)'; }
}

async function initFirebase(){
  if(!firebaseConfig){ setSyncStatus('local'); return; }
  try{
    firebase.initializeApp(firebaseConfig);
    fbDb = firebase.firestore();
    await firebase.auth().signInAnonymously();
    firebase.auth().onAuthStateChanged(user => { fbUser = user; });
    await new Promise(resolve => {
      const unsub = firebase.auth().onAuthStateChanged(user => { if(user){ fbUser = user; unsub(); resolve(); } });
    });
    fbEnabled = true;
    setSyncStatus('synced');
  }catch(e){
    console.error('Firebase init failed, falling back to local storage only:', e);
    fbEnabled = false;
    setSyncStatus('offline');
  }
}
</script>

/* ============ HELPERS: sampling, shuffling ============ */

function shuffleArray(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function shuffleOptions(q){
  const idxs = q.opts.map((_,i)=>i);
  const shuffled = shuffleArray(idxs);
  const newOpts = shuffled.map(i=>q.opts[i]);
  const newCorrect = shuffled.indexOf(q.correct);
  return Object.assign({}, q, {opts:newOpts, correct:newCorrect});
}
function pickN(arr, n){
  const copy = [...arr]; const out = [];
  for(let i=0;i<n && copy.length;i++){ const idx = Math.floor(Math.random()*copy.length); out.push(copy.splice(idx,1)[0]); }
  return out;
}
function sampleQuestions(bank, mode){
  const easy = bank.filter(q=>q.diff==='lengvas');
  const med = bank.filter(q=>q.diff==='vidutinis');
  const hard = bank.filter(q=>q.diff==='sunkus');
  let target = mode === 'browse' ? 2 : 4;
  let selected = mode === 'browse' ? [...pickN(easy,1), ...pickN(med,1)] : [...pickN(easy,1), ...pickN(med,2), ...pickN(hard,1)];
  if(selected.length < target){
    const remaining = bank.filter(q => !selected.includes(q));
    selected = selected.concat(pickN(remaining, target - selected.length));
  }
  selected = shuffleArray(selected);
  return selected.map(shuffleOptions);
}

{id:'t3', title:'Kaip veikia birža?', theory:[
  {h:'Prekybos vieta', p:'Birža yra sistema — šiandien dažniausiai elektroninė — kurioje susitinka pirkėjų ir pardavėjų užsakymai ir sudaromi sandoriai.'},
  {h:'Bid ir ask kainos', p:'Kiekvienu momentu egzistuoja „bid“ kaina (už kurią pirkėjai nori pirkti) ir „ask“ kaina (už kurią pardavėjai nori parduoti). Sandoris įvyksta, kai šios kainos susitinka.'},
  {h:'Likvidumas', p:'Likvidumas parodo, kaip lengvai aktyvą galima nupirkti ar parduoti, žymiai nepakeičiant jo kainos. Populiarios akcijos paprastai yra likvidesnės nei retai prekiaujamos.'}
], quiz:[
  {diff:'lengvas', q:'Kas yra „ask“ kaina?', opts:['Kaina, už kurią pardavėjai nori parduoti','Kaina, už kurią pirkėjai nori pirkti','Fiksuota valstybės nustatyta kaina','Vidutinė metinė kaina'], correct:0, ex:'„Ask“ yra minimali kaina, už kurią pardavėjas sutinka parduoti.'},
  {diff:'lengvas', q:'Kas yra „bid“ kaina?', opts:['Kaina, už kurią pardavėjai nori parduoti','Kaina, už kurią pirkėjai nori pirkti','Akcijos nominali vertė','Praėjusios dienos uždarymo kaina'], correct:1, ex:'„Bid“ yra kaina, kurią pirkėjai siūlo mokėti.'},
  {diff:'vidutinis', q:'Kas atsitinka, kai bid ir ask kainos susitinka?', opts:['Birža sustabdo prekybą','Įvyksta sandoris','Akcija pašalinama iš biržos','Kaina automatiškai padvigubėja'], correct:1, ex:'Sandoris sudaromas tada, kai pirkėjo ir pardavėjo kainos sutampa.'},
  {diff:'vidutinis', q:'Aukštas likvidumas reiškia, kad...', opts:['Aktyvą sunku parduoti be didelio kainos pokyčio','Aktyvą lengva pirkti/parduoti nepakeičiant žymiai kainos','Aktyvo kaina niekada nesikeičia','Aktyvas nėra prieinamas biržoje'], correct:1, ex:'Didelis likvidumas reiškia lengvą pirkimą/pardavimą be didelio poveikio kainai.'},
  {diff:'sunkus', q:'Kodėl retai prekiaujama (mažo likvidumo) akcija gali būti rizikingesnė vien dėl likvidumo, net jei įmonė finansiškai stabili?', opts:['Nes tokių akcijų kaina teisiškai negali kilti','Nes gali būti sunku greitai parduoti be žymaus kainos nuolaidos','Nes jos visada turi didesnį P/E rodiklį','Nes jos negali būti įtrauktos į ETF'], correct:1, ex:'Mažas likvidumas reiškia, kad norint greitai parduoti, gali tekti sutikti su prastesne kaina.'}
]},
{id:'t4', title:'Pasiūla ir paklausa', theory:[
  {h:'Pagrindinis kainos variklis', p:'Kai daugiau žmonių nori pirkti akciją nei parduoti, kaina kyla. Kai atvirkščiai — daugiau norinčių parduoti — kaina krenta.'},
  {h:'Kas veikia paklausą', p:'Paklausą didina geros naujienos, augimo lūkesčiai ar bendras optimizmas rinkoje; mažina — blogos naujienos, nusivylimas ar baimė.'}
], quiz:[
  {diff:'lengvas', q:'Kas nutinka kainai, kai pirkėjų žymiai daugiau nei pardavėjų?', opts:['Kaina paprastai kyla','Kaina paprastai krenta','Kaina nesikeičia','Prekyba automatiškai sustabdoma'], correct:0, ex:'Didesnė paklausa nei pasiūla kelia kainą.'},
  {diff:'lengvas', q:'Kas nutinka kainai, kai pardavėjų žymiai daugiau nei pirkėjų?', opts:['Kaina paprastai kyla','Kaina paprastai krenta','Kaina nesikeičia','Akcija pašalinama iš biržos'], correct:1, ex:'Didesnė pasiūla nei paklausa mažina kainą.'},
  {diff:'vidutinis', q:'Kuris veiksnys paprastai mažina akcijos paklausą?', opts:['Netikėtai geras pelnas','Optimistinės augimo prognozės','Blogos naujienos apie įmonę','Naujas didelis kontraktas'], correct:2, ex:'Blogos naujienos silpnina investuotojų norą pirkti, taigi mažina paklausą.'},
  {diff:'vidutinis', q:'Pasiūlos ir paklausos principas biržoje veikia panašiai kaip...', opts:['Fiksuotų valstybės kainų sistema','Bet kurioje kitoje rinkoje su pirkėjais ir pardavėjais','Loterija','Nekintanti matematinė formulė be išorinių veiksnių'], correct:1, ex:'Akcijų kainos formavimasis remiasi tais pačiais principais kaip ir bet kurioje rinkoje su laisva prekyba.'},
  {diff:'sunkus', q:'Rinkai netikėtai gavus prieštaringą naujieną (dalis investuotojų mano, kad tai gerai, dalis — kad blogai), ko tikėtis kainai iš karto po naujienos?', opts:['Kaina liks visiškai nepakitusi, kol paaiškės tiesa','Kaina gali svyruoti stipriau nei įprastai, kol rinka „susitaria“ dėl reikšmės','Prekyba tokia akcija automatiškai sustabdoma visam laikui','Kaina visada kris, nes neapibrėžtumas visada blogai'], correct:1, ex:'Prieštaringas vertinimas dažnai sukelia didesnį trumpalaikį svyravimą, kol rinkos dalyviai „susitaria“ dėl poveikio.'}
]},
{id:'t5', title:'Akcijos, obligacijos ir ETF', theory:[
  {h:'ETF — krepšelis viename pirkinyje', p:'ETF (biržoje prekiaujamas fondas) sudaro dešimtys ar šimtai skirtingų akcijų ar obligacijų, supakuotų į vieną vertybinį popierių, kuriuo prekiaujama kaip paprasta akcija.'},
  {h:'Kodėl tai patogu', p:'Nupirkę vieną ETF vienetą, iškart gaunate diversifikaciją tarp daugelio įmonių — nereikia pirkti kiekvienos atskirai.'},
  {h:'Trumpas palyginimas', p:'Akcija = nuosavybė vienoje įmonėje. Obligacija = paskola vienam skolininkui. ETF = krepšelis daugelio aktyvų vienu pirkiniu.'}
], quiz:[
  {diff:'lengvas', q:'Kas yra ETF?', opts:['Vienos įmonės akcija','Krepšelis kelių aktyvų, kuriuo prekiaujama kaip akcija','Valstybės išleista obligacija','Banko indėlio sąskaita'], correct:1, ex:'ETF apjungia kelis aktyvus į vieną, biržoje prekiaujamą vertybinį popierių.'},
  {diff:'lengvas', q:'Kokį iš šių trijų geriausiai apibūdina žodžiai „paskola vienam skolininkui“?', opts:['Akcija','Obligacija','ETF','Nė vienas'], correct:1, ex:'Obligacija yra paskola konkrečiam skolininkui (įmonei ar valstybei).'},
  {diff:'vidutinis', q:'Pagrindinis ETF privalumas, palyginus su viena akcija, yra...', opts:['Garantuotas pelnas','Įdėtinė diversifikacija','Nulinė rizika','Fiksuotos palūkanos'], correct:1, ex:'Vienu pirkimu gaunate dalį daugelio skirtingų įmonių — tai sumažina koncentracijos riziką.'},
  {diff:'vidutinis', q:'Kuris teiginys teisingas?', opts:['ETF gali sekti tik vieną konkrečią akciją','Obligacija reiškia nuosavybės dalį įmonėje','Akcija reiškia paskolą įmonei','ETF gali apimti dešimtis ar šimtus skirtingų vertybinių popierių'], correct:3, ex:'ETF būdingas bruožas — jis apjungia daug skirtingų aktyvų viename fonde.'},
  {diff:'sunkus', q:'Investuotojas nori vienu pirkimu gauti diversifikaciją tarp 500 didžiausių JAV įmonių, nesirinkdamas jų po vieną. Kuris instrumentas tam labiausiai tinka?', opts:['Vienos didelės įmonės akcija','Vienos valstybės obligacija','Platus rinkos ETF, sekantis indeksą','Banko terminuotas indėlis'], correct:2, ex:'Platus rinkos ETF, sekantis indeksą, leidžia vienu pirkimu gauti dalį šimtų įmonių.'}
]},
{id:'t6', title:'Dividendai', theory:[
  {h:'Kas yra dividendas', p:'Dividendas — tai dalis įmonės pelno, išmokama akcininkams, dažniausiai kas ketvirtį ar kartą per metus.'},
  {h:'Dividendų pajamingumas', p:'Dividendų pajamingumas (yield) parodo, kiek dividendų per metus gaunate palyginus su akcijos kaina — tai leidžia palyginti skirtingas įmones.'},
  {h:'Ne visos įmonės moka dividendus', p:'Sparčiai augančios įmonės dažnai pelną investuoja atgal į verslą, o ne moka dividendus, tikėdamosis didesnio kainos augimo ateityje.'}
], quiz:[
  {diff:'lengvas', q:'Kas yra dividendas?', opts:['Mokestis, kurį akcininkas moka įmonei','Dalis įmonės pelno, išmokama akcininkams','Paskolos grąžinimas bankui','Akcijos pirkimo kaina'], correct:1, ex:'Dividendas yra pelno dalis, paskirstoma akcininkams.'},
  {diff:'lengvas', q:'Kaip dažnai įmonės dažniausiai moka dividendus?', opts:['Kasdien','Kas ketvirtį ar kartą per metus','Tik vieną kartą per visą įmonės gyvavimą','Kas valandą'], correct:1, ex:'Dividendai paprastai mokami periodiškai — kas ketvirtį ar kartą metuose.'},
  {diff:'vidutinis', q:'Ką parodo dividendų pajamingumas (yield)?', opts:['Bendrą įmonės pelną per metus','Kiek dividendų gaunama palyginus su akcijos kaina','Akcijos kainos pokytį per dieną','Įmonės darbuotojų skaičių'], correct:1, ex:'Yield leidžia palyginti dividendų dydį santykinai su kaina tarp skirtingų įmonių.'},
  {diff:'vidutinis', q:'Kodėl kai kurios sparčiai augančios įmonės nemoka dividendų?', opts:['Nes tai draudžiama pradedančioms įmonėms','Nes jos investuoja pelną atgal į augimą','Nes jos neturi akcininkų','Nes dividendai visada privalomi tik senoms įmonėms'], correct:1, ex:'Augimo įmonės dažnai renkasi pelną reinvestuoti, o ne dalinti akcininkams.'},
  {diff:'sunkus', q:'Įmonė A moka 5% dividendų pajamingumą, bet jos akcijos kaina jau 3 metus nekyla. Įmonė B nemoka dividendų, bet kaina kyla vidutiniškai 12% per metus. Kuris teiginys tiksliausias?', opts:['Įmonė A visada geresnis pasirinkimas dėl dividendų','Įmonė B visada geresnis pasirinkimas dėl augimo','Kuri geresnė, priklauso nuo investuotojo tikslų — pastovios pajamos ar kapitalo augimas','Dividendai visada svarbesni už kainos augimą'], correct:2, ex:'Pasirinkimas priklauso nuo to, ko investuotojas siekia — pastovių pajamų ar ilgalaikio kapitalo augimo.'}
]},
{id:'t7', title:'Rinkos dalyviai', theory:[
  {h:'Mažmeniniai investuotojai', p:'Tai pavieniai žmonės, investuojantys savo asmeninius pinigus per brokerio sąskaitas.'},
  {h:'Instituciniai investuotojai', p:'Tai didelės organizacijos — pensijų fondai, investiciniai fondai, draudimo bendrovės — valdančios didelius kapitalo kiekius.'},
  {h:'Rinkos formuotojai', p:'Rinkos formuotojai (market makers) nuolat siūlo pirkti ir parduoti tam tikrus vertybinius popierius, taip palaikydami rinkos likvidumą.'}
], quiz:[
  {diff:'lengvas', q:'Kas yra mažmeninis investuotojas?', opts:['Didelis pensijų fondas','Pavienis asmuo, investuojantis savo pinigus','Vyriausybinė institucija','Birža pati'], correct:1, ex:'Mažmeninis investuotojas yra individualus asmuo, investuojantis asmeninius pinigus.'},
  {diff:'lengvas', q:'Kas priskiriama instituciniams investuotojams?', opts:['Pavieniai smulkūs investuotojai','Pensijų fondai ir investiciniai fondai','Vidutinės mokyklos moksleiviai','Vienos šeimos taupomosios sąskaitos'], correct:1, ex:'Instituciniai investuotojai — tai stambios organizacijos, valdančios didelį kapitalą.'},
  {diff:'vidutinis', q:'Kokia yra rinkos formuotojo (market maker) funkcija?', opts:['Nustatyti fiksuotą valstybės kainą','Nuolat siūlyti pirkimo ir pardavimo kainas, palaikant likvidumą','Reguliuoti mokesčius','Valdyti visas biržas pasaulyje'], correct:1, ex:'Rinkos formuotojai palaiko nuolatinį pirkimo/pardavimo pasiūlymų srautą, taip užtikrindami likvidumą.'},
  {diff:'vidutinis', q:'Kuo instituciniai investuotojai iš esmės skiriasi nuo mažmeninių?', opts:['Instituciniai investuoja tik į obligacijas','Instituciniai valdo žymiai didesnius kapitalus ir dažnai turi daugiau resursų analizei','Mažmeniniai investuotojai visada uždirba daugiau','Instituciniai investuotojai neturi teisės pirkti akcijų'], correct:1, ex:'Instituciniai investuotojai valdo didelius kapitalus ir dažnai turi daugiau analitinių resursų.'},
  {diff:'sunkus', q:'Kodėl individualiam (mažmeniniam) investuotojui gali būti sunku konkuruoti su instituciniais investuotojais itin trumpalaikėje prekyboje?', opts:['Nes mažmeniniams investuotojams teisiškai draudžiama prekiauti dažnai','Nes instituciniai turi greitesnę informaciją, geresnę technologiją ir didesnius resursus analizei','Nes mažmeniniai investuotojai visada moka didesnius mokesčius už akcijas','Nes instituciniai investuotojai visada žino būsimas kainas'], correct:1, ex:'Instituciniai investuotojai dažnai turi informacinį, technologinį ir resursų pranašumą, ypač trumpalaikėje prekyboje.'}
]},
{id:'t8', title:'Rinkos terminai', theory:[
  {h:'Bull ir bear rinka', p:'„Bull market“ (buliaus rinka) — laikotarpis, kai kainos ilgą laiką kyla ir vyrauja optimizmas. „Bear market“ (lokio rinka) — priešingai, kainos ilgai krenta, vyrauja pesimizmas.'},
  {h:'IPO', p:'IPO (pirminis viešas siūlymas) — tai momentas, kai privati įmonė pirmą kartą parduoda savo akcijas viešai biržoje.'},
  {h:'Rinkos kapitalizacija', p:'Rinkos kapitalizacija (market cap) — bendra visų įmonės akcijų vertė (kaina × akcijų skaičius), naudojama įmonės dydžiui įvertinti.'}
], quiz:[
  {diff:'lengvas', q:'Kas apibūdina „bull market“?', opts:['Ilgalaikis kainų kritimas','Ilgalaikis kainų kilimas ir optimizmas','Vienos dienos kainos šuolis','Biržos uždarymas'], correct:1, ex:'Bull market reiškia ilgalaikį augimo ir optimizmo laikotarpį rinkoje.'},
  {diff:'lengvas', q:'Kas apibūdina „bear market“?', opts:['Ilgalaikis kainų kilimas','Ilgalaikis kainų kritimas ir pesimizmas','Naujos akcijos debiutas','Dividendų mokėjimo diena'], correct:1, ex:'Bear market — ilgalaikis kainų kritimo ir pesimizmo laikotarpis.'},
  {diff:'vidutinis', q:'Kas yra IPO?', opts:['Įmonės bankroto procesas','Pirmas kartas, kai įmonė parduoda akcijas viešai','Metinė įmonės ataskaita','Dividendų mokėjimo diena'], correct:1, ex:'IPO — tai privačios įmonės akcijų debiutas viešoje biržoje.'},
  {diff:'vidutinis', q:'Rinkos kapitalizacija apskaičiuojama kaip...', opts:['Metinis pelnas padalintas iš darbuotojų skaičiaus','Akcijos kaina padauginta iš visų akcijų skaičiaus','Bendra įmonės skola','Vidutinė dividendų suma'], correct:1, ex:'Market cap = akcijos kaina × bendras akcijų skaičius rinkoje.'},
  {diff:'sunkus', q:'Įmonės A akcijos kaina €200, išleista 1 mln. akcijų. Įmonės B akcijos kaina €20, išleista 50 mln. akcijų. Kuri įmonė didesnė pagal rinkos kapitalizaciją?', opts:['Įmonė A (€200 mln.)','Įmonė B (€1 mlrd.)','Abi vienodo dydžio','Neįmanoma nustatyti be daugiau duomenų'], correct:1, ex:'A: 200×1mln.=€200mln. B: 20×50mln.=€1mlrd. Įmonė B didesnė, nors jos akcijos kaina mažesnė.'}
]},
{id:'t9', title:'Kotiruočių skaitymas', theory:[
  {h:'Kainos ir pokytis', p:'Kotiruotėje paprastai matote dabartinę kainą ir pokytį (procentais ar suma) nuo praėjusios prekybos dienos uždarymo.'},
  {h:'Apimtis (volume)', p:'Apimtis rodo, kiek akcijų buvo nupirkta ar parduota per tam tikrą laikotarpį — didesnė apimtis dažnai reiškia stipresnį rinkos susidomėjimą.'},
  {h:'52 savaičių intervalas', p:'52 savaičių aukščiausia ir žemiausia riba parodo, kokiame kainų diapazone akcija prekiavo per pastaruosius metus — tai padeda įvertinti dabartinę kainą kontekste.'}
], optional:{h:'Papildomai: kaip skaityti pilną kotiruotės lentelę', p:'Profesionalios kotiruotės dažnai papildomai rodo P/E rodiklį (kainos ir pelno santykį), rinkos kapitalizaciją bei dividendų pajamingumą vienoje vietoje — tai leidžia greitai palyginti kelias įmones nesigilinant į pilnas ataskaitas.'},
quiz:[
  {diff:'lengvas', q:'Ką rodo akcijos „apimtis“ (volume)?', opts:['Įmonės metinį pelną','Kiek akcijų buvo nupirkta/parduota per laikotarpį','Akcijos kainą prieš metus','Akcininkų skaičių'], correct:1, ex:'Apimtis parodo prekybos aktyvumą — kiek akcijų pakeitė savininką.'},
  {diff:'lengvas', q:'Ką parodo 52 savaičių aukščiausia ir žemiausia riba?', opts:['Įmonės amžių','Kainų diapazoną per pastaruosius metus','Dividendų dydį','Akcininkų sąrašą'], correct:1, ex:'Tai padeda suprasti, ar dabartinė kaina yra arti metinio maksimumo ar minimumo.'},
  {diff:'vidutinis', q:'Kotiruotėje matomas „pokytis“ paprastai lyginamas su...', opts:['Praėjusio mėnesio vidurkiu','Praėjusios prekybos dienos uždarymo kaina','Įmonės įkūrimo kaina','Konkurento kaina'], correct:1, ex:'Dienos pokytis dažniausiai skaičiuojamas nuo ankstesnės uždarymo kainos.'},
  {diff:'vidutinis', q:'Kodėl neįprastai didelė prekybos apimtis be jokios žinomos naujienos gali būti verta dėmesio?', opts:['Ji visada reiškia, kad kaina tuoj dvigubai kris','Ji gali signalizuoti, kad rinka reaguoja į dar viešai nepaskelbtą informaciją','Ji niekada nieko nereiškia','Ji visada rodo techninę biržos klaidą'], correct:1, ex:'Neįprasta apimtis be aiškios priežasties kartais signalizuoja, kad rinkos dalyviai reaguoja į dar neviešą informaciją.'},
  {diff:'sunkus', q:'Akcijos 52 sav. intervalas €30–€90, dabartinė kaina €85, apimtis šiandien 5x didesnė nei įprastai. Ką tai kartu gali reikšti?', opts:['Akcija tikrai toliau kils be jokios abejonės','Akcija prekiauja arti metinio maksimumo su neįprastai dideliu susidomėjimu — verta pasidomėti priežastimi','Akcija tikrai kris, nes yra brangi','Tai reiškia, kad akcija bus pašalinta iš biržos'], correct:1, ex:'Kaina arti metinio maksimumo kartu su didele apimtimi rodo stiprų, neįprastą susidomėjimą — verta išsiaiškinti kodėl, bet tai savaime negarantuoja nei tolimesnio kilimo, nei kritimo.'}
]},
{id:'t10', title:'Investavimo sąskaitų tipai', theory:[
  {h:'Maklerio sąskaita', p:'Standartinė investavimo sąskaita, per kurią perkate ir parduodate vertybinius popierius atviroje rinkoje.'},
  {h:'Mokesčių atžvilgiu privilegijuotos sąskaitos', p:'Daugelyje šalių egzistuoja specialios pensijų ar taupymo sąskaitos su mokesčių lengvatomis, skatinančios ilgalaikį investavimą — konkrečios taisyklės skiriasi priklausomai nuo šalies.'},
  {h:'Pasirinkimas priklauso nuo tikslo', p:'Trumpalaikiams tikslams dažniau tinka paprasta maklerio sąskaita, o ilgalaikiam pensijos kaupimui — specializuotos, mokesčių lengvatas suteikiančios sąskaitos.'}
], quiz:[
  {diff:'lengvas', q:'Kas yra standartinė maklerio sąskaita?', opts:['Sąskaita, per kurią perkami/parduodami vertybiniai popieriai','Banko taupomoji sąskaita be jokių investicijų','Valstybės pensijų fondas','Grynųjų pinigų seifas'], correct:0, ex:'Maklerio sąskaita — pagrindinis įrankis prekybai vertybiniais popieriais.'},
  {diff:'lengvas', q:'Kokiam tikslui dažniausiai naudojamos mokesčių atžvilgiu privilegijuotos sąskaitos?', opts:['Kasdienėms pirkinių išlaidoms','Ilgalaikiam pensijos taupymui','Valiutos keitimui','Paskolų grąžinimui'], correct:1, ex:'Šios sąskaitos dažniausiai skirtos skatinti ilgalaikį taupymą pensijai.'},

let progress = {};

  progress[id] = { topics:{}, caseStudies: MODULE_CONTENT[id].caseStudies.map(()=>({done:false,score:0})), practice:{done:false} };
  MODULE_CONTENT[id].topics.forEach(t => progress[id].topics[t.id] = {theoryRead:false, bestScore:null, attempts:0});

let meta = { mode:null, preTestScore:null, preTestSkipped:false };

async function saveProgress(){
  const payload = Object.assign({}, progress, {_meta: meta});
  try{ localStorage.setItem('academy_progress_v2', JSON.stringify(payload)); }catch(e){}
  if(fbEnabled && fbDb && fbUser){
    setSyncStatus('syncing');
    try{
      await fbDb.collection('academy_progress').doc(fbUser.uid).set(payload);
      setSyncStatus('synced');
    }catch(e){
      console.error('Firebase save failed, progress stays saved locally:', e);
      setSyncStatus('offline');
    }
  }
}
async function loadProgress(){
  try{
    const local = localStorage.getItem('academy_progress_v2');
    if(local) applySavedProgress(JSON.parse(local));
  }catch(e){}
  if(fbEnabled && fbDb && fbUser){
    try{
      const doc = await fbDb.collection('academy_progress').doc(fbUser.uid).get();
      if(doc.exists){
        applySavedProgress(doc.data());
        localStorage.setItem('academy_progress_v2', JSON.stringify(Object.assign({}, progress, {_meta:meta})));
      }
      setSyncStatus('synced');
    }catch(e){
      console.error('Firebase load failed, using local data:', e);
      setSyncStatus('offline');
    }
  }
}
function applySavedProgress(saved){
  if(!saved) return;
  if(saved._meta) meta = Object.assign(meta, saved._meta);
  BUILT_CHAIN.forEach(id => {
    if(saved[id]){
      Object.keys(progress[id].topics).forEach(k => { if(saved[id].topics && saved[id].topics[k]) progress[id].topics[k] = saved[id].topics[k]; });
      if(saved[id].caseStudies) progress[id].caseStudies = saved[id].caseStudies;
      if(saved[id].practice) progress[id].practice = saved[id].practice;
    }
  });
}

function fmt(n){ return '€' + n.toLocaleString('lt-LT',{maximumFractionDigits:0}); }

function topicsAvg(moduleId){
  const topics = MODULE_CONTENT[moduleId].topics;
  const scores = topics.map(t => progress[moduleId].topics[t.id].bestScore).filter(s => s !== null);
  if(scores.length === 0) return 0;
  return scores.reduce((a,b)=>a+b,0) / scores.length;
}
function allTopicsDone(moduleId){
  return MODULE_CONTENT[moduleId].topics.every(t => progress[moduleId].topics[t.id].bestScore !== null);
}
function caseStudiesAvg(moduleId){
  const arr = progress[moduleId].caseStudies;
  const doneScores = arr.filter(cs=>cs.done).map(cs=>cs.score);
  if(doneScores.length===0) return 0;
  return doneScores.reduce((a,b)=>a+b,0)/doneScores.length;
}
function allCaseStudiesDone(moduleId){
  return progress[moduleId].caseStudies.every(cs => cs.done);
}
function capitalRange(){
  return meta.mode === 'browse' ? {base:3000, bonus:2000} : {base:5000, bonus:5000};
}
function moduleStipendija(moduleId){
  const tAvg = topicsAvg(moduleId);
  const cAvg = caseStudiesAvg(moduleId);
  const combined = allCaseStudiesDone(moduleId) ? (tAvg*0.6 + cAvg*0.4) : tAvg;
  const r = capitalRange();
  return Math.round(r.base + (combined/100)*r.bonus);
}
function moduleFullyDone(moduleId){
  return allTopicsDone(moduleId) && allCaseStudiesDone(moduleId) && progress[moduleId].practice.done;
}
function isModuleUnlocked(moduleId){
  const idx = BUILT_CHAIN.indexOf(moduleId);
  if(idx <= 0) return true;
  return moduleFullyDone(BUILT_CHAIN[idx-1]);
}
function overallStipendija(){
  const doneVals = BUILT_CHAIN.filter(id => moduleFullyDone(id)).map(id => moduleStipendija(id));
  const r = capitalRange();
  if(doneVals.length) return Math.round(doneVals.reduce((a,b)=>a+b,0)/doneVals.length);
  const activeId = BUILT_CHAIN.find(id => isModuleUnlocked(id) && !moduleFullyDone(id));
  if(activeId) return Math.round(r.base + (topicsAvg(activeId)/100)*r.bonus*0.5);
  return r.base;
}

function renderHeader(){
  document.getElementById('stipChip').textContent = fmt(overallStipendija()) + ' stipendija';
}

document.getElementById('homeLink').addEventListener('click', () => { view = {name:'syllabus'}; render(); });
document.getElementById('navTranscript').addEventListener('click', () => { view = {name:'transcript'}; render(); });

function render(){
  clearInterval(timerInterval);
  const main = document.getElementById('main');
  if(!meta.mode){ renderModeSelect(main); return; }
  if(meta.preTestScore === null && !meta.preTestSkipped){ renderPreTest(main); return; }
  renderHeader();
  if(view.name === 'syllabus') renderSyllabus(main);
  else if(view.name === 'module') renderModule(main);
  else if(view.name === 'topic') renderTopic(main);
  else if(view.name === 'casestudy') renderCaseStudy(main);
  else if(view.name === 'practice') renderPractice(main);
  else if(view.name === 'transcript') renderTranscript(main);
  else if(view.name === 'certificate') renderCertificate(main);
}

function renderPreTest(main){
  let selections = new Array(PRETEST_QUESTIONS.length).fill(null);
  let submitted = false;
  function draw(){
    let html = `<div class="page-title">Pradinis žinių patikrinimas</div>
      <div class="page-sub">Neprivaloma, bet padės pamatyti, kiek sužinosite per kursą. Galite ir praleisti.</div>
      <div class="content-panel">`;
    PRETEST_QUESTIONS.forEach((q,qi) => {
      html += `<div class="quiz-q"><p class="qtext">${qi+1}. ${q.q}</p>`;
      q.opts.forEach((opt,oi) => {
        let cls = 'qopt';
        if(selections[qi]===oi) cls += ' selected';
        if(submitted){ if(oi===q.correct) cls += ' correct'; else if(selections[qi]===oi) cls += ' incorrect'; }
        html += `<button class="${cls}" data-qi="${qi}" data-oi="${oi}" ${submitted?'disabled':''}>${opt}</button>`;
      });
      html += `</div>`;
    });
    if(!submitted){
      const allAnswered = selections.every(s=>s!==null);
      html += `<button class="submit-btn" id="preSubmitBtn" ${allAnswered?'':'disabled'}>Pateikti</button>
        <button class="continue-btn" id="preSkipBtn" style="background:var(--bg-card);color:var(--ink);border:1px solid var(--border);margin-left:8px;">Praleisti</button>`;
    } else {
      const correctCount = selections.filter((s,i)=>s===PRETEST_QUESTIONS[i].correct).length;
      const pct = Math.round((correctCount/PRETEST_QUESTIONS.length)*100);
      meta.preTestScore = pct;
      saveProgress();
      html += `<div class="quiz-result"><div class="score">${pct}%</div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">Tai jūsų atspirties taškas — pamatysime, kaip jis pasikeis kurso pabaigoje!</div>
        <button class="continue-btn" id="preContinueBtn">Pradėti kursą →</button></div>`;
    }
    html += `</div>`;
    main.innerHTML = html;
    if(!submitted){
      main.querySelectorAll('.qopt').forEach(btn => btn.addEventListener('click', () => { selections[parseInt(btn.dataset.qi)]=parseInt(btn.dataset.oi); draw(); }));
      const sb = document.getElementById('preSubmitBtn'); if(sb) sb.addEventListener('click', () => { submitted=true; draw(); });
      document.getElementById('preSkipBtn').addEventListener('click', () => { meta.preTestSkipped=true; saveProgress(); view={name:'syllabus'}; render(); });
    } else {
      document.getElementById('preContinueBtn').addEventListener('click', () => { view={name:'syllabus'}; render(); });
    }
  }
  draw();
}

      statusHtml = done ? '<span class="tag tag-done">✓ Baigta</span>' : (unlocked ? '<span class="tag tag-open">Galima pradėti</span>' : '<span class="tag tag-locked">🔒 Užrakinta</span>');

    } else {
      statusHtml = '<span class="tag tag-locked">🔧 Ruošiama</span>';
    }
    html += `<div class="module-row ${m.built && isModuleUnlocked(m.id) ? '' : 'locked'}" data-id="${m.id}">
      <div class="module-badge-icon">${m.icon}</div>
      <div style="flex:1">

/* ============ MODULE VIEW (topic list) ============ */

      <span class="topic-num">📌</span><span class="topic-status-icon">${icon}</span>

/* ============ TOPIC: THEORY + QUIZ ============ */

function renderTopic(main){
  const moduleId = view.moduleId;
  const content = MODULE_CONTENT[moduleId];
  const t = content.topics.find(x => x.id === view.topicId);
  const tp = progress[moduleId].topics[t.id];
  let stage = tp.theoryRead ? 'quiz' : 'theory';

  function drawTheory(){
    const totalChars = t.theory.reduce((s,sec) => s + sec.p.length, 0);
    const requiredSec = Math.min(60, Math.max(25, Math.round(totalChars / 14)));
    let elapsed = 0;

    let html = `<div class="back-link" id="backBtn">← Atgal į modulį</div><div class="content-panel">
      <h2 style="font-size:19px;margin-bottom:16px;">${t.title}</h2>`;
    t.theory.forEach(sec => { html += `<div class="theory-section"><h3>${sec.h}</h3><p>${sec.p}</p></div>`; });
    if(t.optional){
      html += `<details class="optional-box"><summary>💡 ${t.optional.h} (neprivaloma)</summary><p>${t.optional.p}</p></details>`;
    }
    html += `<div class="timer-wrap">
        <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
        <div class="timer-label" id="timerLabel">Skaitykite ramiai... liko ${requiredSec}s</div>
      </div>
      <button class="continue-btn" id="theoryContinueBtn" disabled>Tęsti į testą →</button>
    </div>`;
    main.innerHTML = html;
    document.getElementById('backBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });

    timerInterval = setInterval(() => {
      elapsed++;
      const pct = Math.min(100, Math.round((elapsed/requiredSec)*100));
      const fillEl = document.getElementById('timerFill');
      const labelEl = document.getElementById('timerLabel');
      if(fillEl) fillEl.style.width = pct + '%';
      if(elapsed >= requiredSec){
        clearInterval(timerInterval);
        if(labelEl) labelEl.textContent = 'Perskaityta ✓ Galite tęsti.';
        const btn = document.getElementById('theoryContinueBtn');
        if(btn) btn.disabled = false;
      } else if(labelEl){
        labelEl.textContent = `Skaitykite ramiai... liko ${requiredSec-elapsed}s`;
      }
    }, 1000);

    document.getElementById('theoryContinueBtn').addEventListener('click', () => {
      tp.theoryRead = true;
      saveProgress();
      clearInterval(timerInterval);
      stage = 'quiz';
      drawQuiz();
    });
  }

  function drawQuiz(){
    let quizSet, selections, submitted;

    function startAttempt(){
      quizSet = sampleQuestions(t.quiz, meta.mode || 'learn');
      selections = new Array(quizSet.length).fill(null);
      submitted = false;
      draw();
    }

    function draw(){
      let html = `<div class="back-link" id="backBtn2">← Atgal į modulį</div><div class="content-panel">
        <h2 style="font-size:19px;margin-bottom:16px;">${t.title} — testas</h2>`;
      quizSet.forEach((q, qi) => {
        const diffLabel = q.diff === 'lengvas' ? '🟢 lengvas' : (q.diff === 'sunkus' ? '🔴 sunkus' : '🟡 vidutinis');
        html += `<div class="quiz-q"><p class="qtext">${qi+1}. ${q.q} <span style="font-size:10.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;">(${diffLabel})</span></p>`;
        q.opts.forEach((opt, oi) => {
          let cls = 'qopt';
          if(selections[qi] === oi) cls += ' selected';
          if(submitted){
            if(oi === q.correct) cls += ' correct';
            else if(selections[qi] === oi) cls += ' incorrect';
          }
          html += `<button class="${cls}" data-qi="${qi}" data-oi="${oi}" ${submitted?'disabled':''}>${opt}</button>`;
        });
        if(submitted) html += `<div class="explain">${q.ex}</div>`;
        html += `</div>`;
      });
      if(!submitted){
        const allAnswered = selections.every(s => s !== null);
        html += `<button class="submit-btn" id="quizSubmitBtn" ${allAnswered?'':'disabled'}>Pateikti atsakymus</button>`;
      } else {
        const correctCount = selections.filter((s,i) => s === quizSet[i].correct).length;
        const scorePct = Math.round((correctCount/quizSet.length)*100);
        const passThreshold = PASS_THRESHOLD[meta.mode || 'learn'];
        const passed = (correctCount/quizSet.length) >= passThreshold;
        tp.attempts++;
        if(passed && (tp.bestScore === null || scorePct > tp.bestScore)) tp.bestScore = scorePct;
        else if(tp.bestScore === null) tp.bestScore = null; // keep null if never passed, so topic stays incomplete
        saveProgress();
        html += `<div class="quiz-result">
          <div style="color:var(--muted);font-size:13px;">Rezultatas</div>
          <div class="score" style="color:${passed?'var(--gain)':'var(--loss)'}">${correctCount}/${quizSet.length} (${scorePct}%)</div>
          <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">${passed ? 'Tema įskaityta! Geriausias rezultatas: '+tp.bestScore+'%' : 'Reikia bent '+Math.round(passThreshold*100)+'%. Pabandykite dar kartą — klausimai bus kitokie.'}</div>
          <button class="submit-btn" id="retryBtn">Bandyti dar kartą</button>
          <button class="continue-btn" id="doneBtn" style="margin-left:8px;">Grįžti į modulį</button>
        </div>`;
      }
      html += `</div>`;
      main.innerHTML = html;
      document.getElementById('backBtn2').addEventListener('click', () => { view={name:'module', moduleId}; render(); });

      if(!submitted){
        main.querySelectorAll('.qopt').forEach(btn => {
          btn.addEventListener('click', () => { selections[parseInt(btn.dataset.qi)] = parseInt(btn.dataset.oi); draw(); });
        });
        const sb = document.getElementById('quizSubmitBtn');
        if(sb) sb.addEventListener('click', () => { submitted = true; draw(); });
      } else {
        document.getElementById('retryBtn').addEventListener('click', () => { startAttempt(); });
        document.getElementById('doneBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });
      }
    }
    startAttempt();
  }

  if(stage === 'theory') drawTheory(); else drawQuiz();
}

      html += `<div class="quiz-q"><p class="qtext">${qi+1}. ${q.q}</p>`;
      q.opts.forEach((opt, oi) => {
        let cls = 'qopt';
        if(selections[qi] === oi) cls += ' selected';
        if(submitted){
          if(oi === q.correct) cls += ' correct';
          else if(selections[qi] === oi) cls += ' incorrect';
        }
        html += `<button class="${cls}" data-qi="${qi}" data-oi="${oi}" ${submitted?'disabled':''}>${opt}</button>`;
      });

    });

      html += `<button class="submit-btn" id="csSubmitBtn" ${allAnswered?'':'disabled'}>Pateikti</button>`;
    } else {
      const correctCount = selections.filter((s,i)=>s===cs.questions[i].correct).length;
      const scorePct = Math.round((correctCount/cs.questions.length)*100);
      progress[moduleId].caseStudies[idx] = {done:true, score: Math.max(scorePct, progress[moduleId].caseStudies[idx].score||0)};
      saveProgress();
      html += `<div class="quiz-result">
        <div class="score" style="color:${scorePct>=70?'var(--gain)':'var(--loss)'}">${correctCount}/${cs.questions.length} (${scorePct}%)</div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">Atvejo analizė įskaityta. Stipendija atnaujinta pagal geriausią rezultatą.</div>
        <button class="continue-btn" id="doneBtn">Grįžti į modulį</button>
      </div>`;

    html += `</div>`;

    if(!submitted){

      });
      const sb = document.getElementById('csSubmitBtn');
      if(sb) sb.addEventListener('click', () => { submitted=true; draw(); });
    } else {
      document.getElementById('doneBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });
    }
  }
  draw();
}

/* ============ PRACTICE (dispatches by type) ============ */

function renderPractice(main){
  const moduleId = view.moduleId;
  const practice = MODULE_CONTENT[moduleId].practice;
  if(practice.type === 'news') renderPracticeNews(main, moduleId, practice);
  else if(practice.type === 'allocation') renderPracticeAllocation(main, moduleId, practice);
  else if(practice.type === 'statement') renderPracticeStatement(main, moduleId, practice);
}

function renderPracticeNews(main, moduleId, practice){
  const capital = moduleStipendija(moduleId);
  const allItems = practice.data.items;
  const items = meta.mode === 'browse' ? allItems.slice(0,3) : allItems;
  let answers = new Array(items.length).fill(null);
  let bonusAnswer = null;
  const showBonus = meta.mode === 'learn' && practice.data.bonusMath;

  function draw(){
    let html = `<div class="back-link" id="backBtn">← Atgal į modulį</div><div class="page-title">🎯 ${practice.label}</div>
      <div class="page-sub">Jūsų stipendija šiai praktikai: <b style="color:var(--gold)">${fmt(capital)}</b> (priklauso nuo testų rezultatų)</div>
      <div class="content-panel">
      <p style="color:var(--muted);font-size:13px;margin-bottom:16px;">Perskaitykite kiekvieną naujieną ir nuspėkite, kaip pasikeis akcijos kaina.</p>`;
    items.forEach((n,i) => {
      html += `<div class="practice-item"><p class="headline">${n.text}</p>
        <div class="choice-row">
          <button class="choice-btn" data-i="${i}" data-v="up" ${answers[i]?'disabled':''}>📈 Kils</button>
          <button class="choice-btn" data-i="${i}" data-v="down" ${answers[i]?'disabled':''}>📉 Kris</button>
        </div>`;
      if(answers[i]){
        const correct = answers[i]===n.answer;
        html += `<div class="explain" style="margin-top:8px;color:${correct?'var(--gain)':'var(--loss)'}">${correct?'✓ Teisingai. ':'✗ Netiksliai. '}${n.why}</div>`;
      }
      html += `</div>`;
    });
    const allDone = answers.every(a=>a!==null);
    if(allDone && showBonus){
      const bm = practice.data.bonusMath;
      html += `<div class="practice-item" style="border-color:var(--gold);"><p class="headline">🧮 Papildomas mąstymo klausimas: ${bm.q}</p>
        <div class="choice-row" style="flex-wrap:wrap;">`;
      bm.opts.forEach((opt,oi) => {
        let cls = 'choice-btn';
        if(bonusAnswer!==null){ if(oi===bm.correct) cls+=' right'; else if(bonusAnswer===oi) cls+=' wrong'; }
        html += `<button class="${cls}" data-boi="${oi}" ${bonusAnswer!==null?'disabled':''} style="flex:0 0 45%;">${opt}</button>`;
      });
      html += `</div>`;
      if(bonusAnswer!==null) html += `<div class="explain" style="margin-top:8px;">${bm.ex}</div>`;
      html += `</div>`;
    }
    if(allDone && (!showBonus || bonusAnswer!==null)){
      const correctCount = answers.filter((a,i)=>a===items[i].answer).length;
      html += `<div class="feedback-box">Rezultatas: ${correctCount}/${items.length} teisingai su ${fmt(capital)} virtualiu kapitalu.</div>
      <button class="continue-btn" id="finishBtn">Baigti modulį →</button>`;
    }
    html += `</div>`;
    main.innerHTML = html;
    document.getElementById('backBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });
    main.querySelectorAll('.choice-btn[data-i]:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => { answers[parseInt(btn.dataset.i)] = btn.dataset.v; draw(); });
    });
    main.querySelectorAll('.choice-btn[data-boi]:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => { bonusAnswer = parseInt(btn.dataset.boi); draw(); });
    });
    const fb = document.getElementById('finishBtn');
    if(fb) fb.addEventListener('click', () => {
      progress[moduleId].practice.done = true;
      saveProgress();
      view = {name:'certificate', moduleId};
      render();
    });
  }
  draw();
}

function renderPracticeAllocation(main, moduleId, practice){
  const capital = moduleStipendija(moduleId);
  const assets = practice.assets;
  function draw(){
    let html = `<div class="back-link" id="backBtn">← Atgal į modulį</div><div class="page-title">🎯 ${practice.label}</div>
      <div class="page-sub">Turimas kapitalas: <b style="color:var(--gold)">${fmt(capital)}</b> — paskirstykite procentais tarp 5 aktyvų.</div>
      <div class="content-panel">`;
    assets.forEach((a,i) => {
      html += `<div class="alloc-row"><div><div class="alloc-name">${a.name}</div><div class="alloc-risk">${a.risk}</div></div>
        <div><input type="number" min="0" max="100" class="alloc-input" id="alloc-${i}" value="0">%</div></div>`;
    });
    html += `<div class="alloc-total" id="allocTotal">Iš viso: 0%</div><button class="submit-btn" id="allocSubmitBtn">Pateikti</button><div id="allocFeedback"></div></div>`;
    main.innerHTML = html;
    document.getElementById('backBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });

    function updateTotal(){ let t=0; assets.forEach((a,i)=>t+=parseInt(document.getElementById('alloc-'+i).value)||0); document.getElementById('allocTotal').textContent='Iš viso: '+t+'%'; return t; }
    assets.forEach((a,i)=>document.getElementById('alloc-'+i).addEventListener('input', updateTotal));

    document.getElementById('allocSubmitBtn').addEventListener('click', () => {
      const total = updateTotal();
      if(total !== 100){ document.getElementById('allocFeedback').innerHTML = `<div class="feedback-box" style="border-color:var(--loss);">Procentai turi susumuoti lygiai į 100%. Šiuo metu: ${total}%.</div>`; return; }
      const allocs = assets.map((a,i)=>parseInt(document.getElementById('alloc-'+i).value)||0);
      const maxAlloc = Math.max(...allocs);
      const numUsed = allocs.filter(v=>v>0).length;
      const weightedVol = allocs.reduce((s,v,i)=>s+(v/100)*assets[i].vol,0);
      const swingEuros = Math.round(capital * weightedVol);
      let verdict;
      if(maxAlloc>60) verdict = 'Portfelis stipriai sutelktas viename aktyve — tai padidina riziką prarasti didelę dalį, jei tas aktyvas nuvertėtų.';
      else if(numUsed<=2) verdict = 'Naudojate mažai skirtingų aktyvų — diversifikacija galėtų būti platesnė.';
      else if(maxAlloc<=40 && numUsed>=4) verdict = 'Gerai diversifikuotas portfelis — rizika paskirstyta tarp kelių skirtingo rizikos lygio aktyvų.';
      else verdict = 'Vidutiniškai diversifikuotas portfelis — neblogas balansas, bet galėtumėte paskirstyti dar tolygiau.';
      document.getElementById('allocFeedback').innerHTML = `<div class="feedback-box"><b>Įvertintas portfelio volatilumas:</b> ${(weightedVol*100).toFixed(1)}%<br><b>Galimas dienos svyravimas:</b> apytiksliai ±${fmt(swingEuros)}<br><b>Didžiausia koncentracija viename aktyve:</b> ${maxAlloc}%<br><br>${verdict}</div>
        <button class="continue-btn" id="finishBtn">Baigti modulį →</button>`;
      document.getElementById('finishBtn').addEventListener('click', () => {
        progress[moduleId].practice.done = true;
        saveProgress();
        view = {name:'certificate', moduleId};
        render();
      });
    });
  }
  draw();
}

  PLANNED_MODULES.forEach(m => {
    if(!m.built){
      html += `<tr><td colspan="2" style="color:var(--muted);font-weight:600;padding-top:14px;">${m.title} — ruošiama</td></tr>`;
      return;
    }
    html += `<tr><td colspan="2" style="color:var(--gold);font-weight:600;padding-top:14px;">${m.title}</td></tr>`;
    MODULE_CONTENT[m.id].topics.forEach(t => {
      const tp = progress[m.id].topics[t.id];
      html += `<tr><td>${t.title}</td><td class="score-cell">${tp.bestScore !== null ? tp.bestScore+'%' : '—'}</td></tr>`;
    });
    MODULE_CONTENT[m.id].caseStudies.forEach((cs, idx) => {
      const csProg = progress[m.id].caseStudies[idx];
      html += `<tr><td>${cs.title}</td><td class="score-cell">${csProg.done ? csProg.score+'%' : '—'}</td></tr>`;
    });
    html += `<tr><td>Praktika</td><td class="score-cell">${progress[m.id].practice.done ? 'Baigta' : '—'}</td></tr>`;
    html += `<tr><td><b>Modulio vidurkis</b></td><td class="score-cell"><b>${Math.round(topicsAvg(m.id))}%</b></td></tr>`;
    if(moduleFullyDone(m.id)) badges.push({icon:'🏅', name:m.badgeName});
    if(topicsAvg(m.id) === 100 && allTopicsDone(m.id)) badges.push({icon:'🌟', name:'Tobulas mokinys („'+m.title+'“)'});
  });
  html += `</tbody></table>`;
  html += `<div class="badge-row">${badges.length ? badges.map(b=>`<div class="badge-chip">${b.icon} ${b.name}</div>`).join('') : '<span style="color:var(--muted);font-size:12.5px;">Kol kas ženklelių nėra — baikite modulį, kad juos gautumėte.</span>'}</div>`;
  main.innerHTML = html;
}

/* ============ CERTIFICATE ============ */

function renderCertificate(main){
  const moduleId = view.moduleId;
  const m = PLANNED_MODULES.find(x => x.id === moduleId);
  const avgScore = Math.round(topicsAvg(moduleId));
  const compareHtml = meta.preTestScore !== null
    ? `<div style="color:var(--muted);font-size:12.5px;margin-top:10px;">Pradinis žinių testas: ${meta.preTestScore}% → Šio modulio vidurkis: ${avgScore}% (${avgScore-meta.preTestScore>=0?'+':''}${avgScore-meta.preTestScore} p.p.)</div>`
    : '';

  if(meta.mode === 'browse'){
    main.innerHTML = `<div class="certificate">
      <h2>✓ Peržiūra baigta</h2>
      <div class="cert-box" style="border-width:1px;">
        <div class="cname" style="font-size:20px;">${m.title}</div>
        <div style="color:var(--muted);font-size:13px;">Peržiūrėjote šį modulį su ${avgScore}% vidutiniu rezultatu.</div>
        ${compareHtml}
      </div>
      <button class="continue-btn" id="backHomeBtn">Grįžti į silabusą</button>
    </div>`;
    document.getElementById('backHomeBtn').addEventListener('click', () => { view={name:'syllabus'}; render(); });
    return;
  }

  main.innerHTML = `
    <div class="certificate" id="certWrap">
      <h2>🎓 Sveikiname!</h2>
      <div class="cert-box">
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;">INVESTAVIMO AKADEMIJA</div>
        <div class="cname">${m.title}</div>
        <div style="color:var(--muted);font-size:13px;">Sėkmingai užbaigta su ${avgScore}% vidutiniu rezultatu</div>
        ${compareHtml}
        <div style="margin-top:14px;font-size:12.5px;color:var(--gold);">${m.icon} Ženklelis: ${m.badgeName}</div>
      </div>
      <button class="continue-btn" id="backHomeBtn">Grįžti į silabusą</button>
    </div>`;
  document.getElementById('backHomeBtn').addEventListener('click', () => { view={name:'syllabus'}; render(); });

  const colors = ['#D9A441','#3FA796','#C1553B','#EDEAE0'];
  const wrap = document.getElementById('certWrap');
  for(let i=0;i<60;i++){
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random()*100 + '%';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (2 + Math.random()*2) + 's';
    el.style.animationDelay = (Math.random()*0.8) + 's';
    wrap.appendChild(el);
  }
}

(async function(){
  await initFirebase();
  await loadProgress();
  render();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.error('SW registracija nepavyko:', e));
  });
}
</script>
