<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investavimo Akademija</title>
<meta name="theme-color" content="#0B0F14">
<meta name="description" content="Interaktyvus investavimo mokymosi kursas">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14; --bg-panel:#121821; --bg-card:#161D28; --ink:#EDEAE0; --muted:#8B93A1;
    --gain:#3FA796; --loss:#C1553B; --gold:#D9A441; --border:#232B36; --locked:#2b3038; --ink-soft:#D8D5C9;
  }
  [data-theme="light"]{
    --bg:#F7F4ED; --bg-panel:#FFFFFF; --bg-card:#FBF9F4; --ink:#211D17; --muted:#6B6558;
    --gain:#2B8577; --loss:#A8422A; --gold:#A9781F; --border:#E2DDD0; --locked:#E8E4D8; --ink-soft:#3D3A32;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;overflow:hidden;height:100%;height:100dvh;}
  #app{max-width:980px;margin:0 auto;height:100%;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
  #main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 40px;}
  h1,h2,h3{font-family:'Fraunces',serif;margin:0;}
  .hidden{display:none !important;}
  a{color:var(--gold);}

  header.top{padding:22px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;background:var(--bg);z-index:10;flex-shrink:0;}
  header.top h1{font-size:22px;font-weight:700;letter-spacing:.4px;cursor:pointer;}
  header.top h1 span{color:var(--gold);}
  .nav-right{display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);}
  .nav-link{cursor:pointer;padding:6px 10px;border-radius:5px;}
  .nav-link:hover{color:var(--ink);background:var(--bg-card);}
  .menu-wrap{position:relative;}
  .menu-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:6px;font-size:16px;cursor:pointer;line-height:1;}
  .menu-btn:hover{color:var(--gold);border-color:var(--gold);}
  .dropdown-menu{display:none;position:absolute;top:38px;right:0;background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;padding:12px;min-width:190px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,0.3);}
  .dropdown-menu.open{display:block;}
  .dropdown-item{cursor:pointer;padding:8px 10px;border-radius:5px;font-size:13px;color:var(--ink);}
  .dropdown-item:hover{background:var(--bg-card);}
  .dropdown-divider{height:1px;background:var(--border);margin:9px 0;}
  .dropdown-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;padding:0 10px 6px;}
  .dropdown-row{display:flex;gap:6px;padding:0 10px;}
  .font-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--muted);width:32px;height:28px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;flex:1;}
  .font-btn:hover{color:var(--gold);border-color:var(--gold);}
  .theme-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--muted);padding:6px 8px;border-radius:5px;font-size:11.5px;cursor:pointer;flex:1;}
  .theme-btn:hover{color:var(--gold);border-color:var(--gold);}
  .theme-btn.active{border-color:var(--gold);color:var(--gold);}
  .dropdown-version{font-size:9.5px;color:var(--muted);text-align:center;padding-top:2px;font-family:'JetBrains Mono',monospace;opacity:0.6;}
  .stipendija-chip{background:var(--bg-card);border:1px solid var(--gold);color:var(--gold);padding:5px 12px;border-radius:20px;font-weight:700;}
  .sync-status{cursor:default;font-size:14px;}

  .page-title{font-size:24px;margin:22px 0 4px;}
  .page-sub{color:var(--muted);font-size:13px;margin-bottom:20px;}

  .module-row{display:flex;gap:16px;align-items:flex-start;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:12px;cursor:pointer;transition:border-color .15s;}
  .module-row:hover{border-color:var(--gold);}
  .module-row.locked{opacity:.5;cursor:not-allowed;}
  .module-row.locked:hover{border-color:var(--border);}
  .module-badge-icon{font-size:28px;width:44px;text-align:center;flex-shrink:0;}
  .module-row h3{font-size:16.5px;margin-bottom:3px;}
  .module-row p{font-size:12.5px;color:var(--muted);margin:0 0 8px;}
  .module-meta{display:flex;gap:10px;align-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;}
  .tag{padding:3px 9px;border-radius:20px;}
  .tag-open{background:rgba(217,164,65,0.15);color:var(--gold);}
  .tag-done{background:rgba(63,167,150,0.15);color:var(--gain);}
  .tag-locked{background:var(--locked);color:var(--muted);}
  .mini-bar-track{width:100px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
  .mini-bar-fill{height:100%;background:var(--gold);}
  .stipendija-breakdown{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted);background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin:14px 0;}
  .stipendija-breakdown b{color:var(--gold);}

  .back-link{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);cursor:pointer;display:inline-block;margin:18px 0 10px;}
  .back-link:hover{color:var(--gold);}
  .topic-list{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
  .topic-row{display:flex;align-items:center;gap:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:12px 16px;cursor:pointer;}
  .topic-row:hover{border-color:var(--gold);}
  .topic-row.disabled{opacity:.4;cursor:not-allowed;}
  .topic-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);width:22px;}
  .topic-row .t-title{flex:1;font-size:14px;}
  .topic-score{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gain);}
  .topic-status-icon{font-size:15px;}
  .capstone-row{border-color:var(--gold);}
  .practice-row{border-style:dashed;}

  .content-panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;padding:24px 26px;margin-top:14px;}
  .theory-section{margin-bottom:18px;}
  .theory-section h3{font-size:15.5px;color:var(--gold);margin-bottom:8px;}
  .theory-section p{font-size:14px;line-height:1.7;color:var(--ink-soft);}
  .optional-box{margin-top:16px;border:1px dashed var(--border);border-radius:6px;padding:12px 14px;}
  .optional-box summary{cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--gold);}
  .optional-box p{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.6;}
  .visual-example{margin:16px 0;}
  .visual-example .ve-intro{font-size:12.5px;color:var(--muted);margin-bottom:10px;line-height:1.6;}
  .quote-mock{background:var(--bg-card);border:1px solid var(--gold);border-radius:8px;padding:16px 18px;font-family:'JetBrains Mono',monospace;}
  .quote-mock-head{font-size:13px;color:var(--muted);margin-bottom:4px;}
  .quote-mock-price{font-size:24px;font-weight:700;color:var(--ink);margin-bottom:12px;}
  .quote-mock-price .up{color:var(--gain);font-size:14px;margin-left:8px;}
  .quote-mock-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .quote-mock-grid div{display:flex;flex-direction:column;gap:3px;}
  .quote-mock-grid span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .quote-mock-grid b{font-size:13px;color:var(--ink);}
  @media(max-width:480px){.quote-mock-grid{grid-template-columns:1fr 1fr;}}
  .timer-wrap{margin-top:18px;}
  .timer-track{width:100%;height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:8px;}
  .timer-fill{height:100%;background:var(--gold);width:0%;transition:width 1s linear;}
  .timer-label{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted);}
  .continue-btn{margin-top:14px;background:var(--gold);color:#161207;border:none;padding:10px 20px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12.5px;cursor:pointer;}
  .continue-btn:disabled{background:#3a3a3a;color:#888;cursor:not-allowed;}

  .quiz-q{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
  .quiz-q:last-of-type{border-bottom:none;}
  .quiz-q p.qtext{font-size:14px;font-weight:600;margin-bottom:9px;}
  .qopt{display:block;width:100%;text-align:left;background:var(--bg-card);border:1px solid var(--border);color:var(--ink);padding:9px 13px;border-radius:5px;font-size:13px;margin-bottom:7px;cursor:pointer;}
  .qopt:hover{border-color:var(--gold);}
  .qopt.selected{border-color:var(--gold);background:var(--bg-card);}
  .qopt.correct{border-color:var(--gain);background:rgba(63,167,150,0.12);}
  .qopt.incorrect{border-color:var(--loss);background:rgba(193,85,59,0.12);}
  .qopt:disabled{cursor:default;}
  .explain{font-size:12px;color:var(--muted);margin-top:5px;}
  .submit-btn{background:var(--gold);color:#161207;border:none;padding:10px 20px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12.5px;cursor:pointer;}
  .submit-btn:disabled{background:#3a3a3a;color:#888;cursor:not-allowed;}
  .quiz-result{text-align:center;padding:16px;}
  .quiz-result .score{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;margin:8px 0;}

  table.transcript{width:100%;border-collapse:collapse;font-size:13px;}
  table.transcript th, table.transcript td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);}
  table.transcript th{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;}
  .score-cell{font-family:'JetBrains Mono',monospace;}
  .badge-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
  .badge-chip{display:flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--gold);border-radius:20px;padding:6px 12px;font-size:12px;}

  .practice-item{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:12px;}
  .practice-item p.headline{font-size:14px;margin:0 0 10px;}
  .choice-row{display:flex;gap:10px;}
  .choice-btn{flex:1;padding:9px;border-radius:5px;border:1px solid var(--border);background:var(--bg-panel);color:var(--ink);font-family:'JetBrains Mono',monospace;font-size:12.5px;cursor:pointer;}
  .choice-btn:hover{border-color:var(--gold);}
  .choice-btn.right{border-color:var(--gain);background:rgba(63,167,150,0.15);}
  .choice-btn.wrong{border-color:var(--loss);background:rgba(193,85,59,0.15);}
  .choice-btn:disabled{cursor:default;}
  .feedback-box{margin-top:16px;padding:14px 16px;border-radius:6px;border-left:3px solid var(--gold);background:var(--bg-card);font-size:13.5px;line-height:1.6;color:var(--ink-soft);}

  .ticker-wrap{overflow:hidden;background:var(--bg-panel);border:1px solid var(--gold);border-radius:6px;white-space:nowrap;height:30px;display:flex;align-items:center;margin-bottom:14px;}
  .ticker{display:inline-block;padding-left:100%;animation:scroll-left 26s linear infinite;font-family:'JetBrains Mono',monospace;font-size:11.5px;}
  .ticker span{margin-right:28px;}
  @keyframes scroll-left{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
  .sim-stats{display:flex;gap:14px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:12px;align-items:center;}
  .sim-stats b{color:var(--ink);}
  .sim-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;}
  @media(max-width:780px){.sim-grid{grid-template-columns:1fr;}}
  .stock-card{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:11px 13px;margin-bottom:9px;}
  .stock-head{display:flex;justify-content:space-between;}
  .stock-name{font-family:'Fraunces',serif;font-size:14.5px;font-weight:600;}
  .stock-sector{font-size:10.5px;color:var(--muted);}
  .stock-price{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;text-align:right;}
  .stock-change{font-family:'JetBrains Mono',monospace;font-size:11px;text-align:right;}
  .stock-body{display:flex;gap:11px;align-items:center;margin-top:7px;}
  .stock-desc{font-size:11px;color:var(--muted);flex:1;line-height:1.4;}
  .stock-controls{display:flex;gap:6px;align-items:center;margin-top:9px;flex-wrap:wrap;}
  .stock-controls input{width:48px;background:var(--bg-panel);border:1px solid var(--border);color:var(--ink);font-family:'JetBrains Mono',monospace;padding:5px 6px;border-radius:4px;font-size:11.5px;}
  .btn{border:none;border-radius:4px;padding:6px 9px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;}
  .btn-buy{background:var(--gain);color:#04211d;} .btn-sell{background:var(--loss);color:#2a0e07;}
  .btn:disabled{background:#333;color:#888;cursor:not-allowed;}
  .owned-tag{font-size:10.5px;color:var(--muted);margin-left:auto;font-family:'JetBrains Mono',monospace;}
  .side-panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:6px;padding:11px 13px;margin-bottom:12px;}
  .side-panel h4{font-family:'Fraunces',serif;font-size:13px;color:var(--gold);margin:0 0 7px;}
  #newsFeedSim .news-item{font-size:11px;color:var(--muted);padding:5px 0;border-bottom:1px solid var(--border);}
  #newsFeedSim .tip{color:var(--gold);}
  .holding-row{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);}
  #nextDayBtn{background:var(--gold);color:#161207;border:none;padding:8px 15px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;cursor:pointer;}
  #nextDayBtn:disabled{background:#3a3a3a;color:#888;}
  .certificate{text-align:center;padding:40px 20px;position:relative;overflow:hidden;}
  .certificate h2{font-size:28px;color:var(--gold);margin-bottom:8px;}
  .cert-box{border:2px solid var(--gold);border-radius:10px;padding:34px 26px;max-width:560px;margin:20px auto;background:var(--bg-card);}
  .cert-box .cname{font-family:'Fraunces',serif;font-size:26px;margin:14px 0;color:var(--ink);}
  .confetti{position:absolute;top:-10px;width:8px;height:8px;opacity:0.9;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(500px) rotate(360deg);opacity:0;}}
</style>
</head>

<!-- ============ FIREBASE (progreso saugojimui debesyje) ============ -->
<!-- Jei nenorite naudoti Firebase, tiesiog palikite firebaseConfig tuščią (null) -->
<!-- žemiau — programėlė automatiškai naudos tik šio įrenginio atmintį (localStorage). -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* ==========================================================================
   FIREBASE KONFIGŪRACIJA
   1. Eikite į https://console.firebase.google.com ir susikurkite nemokamą projektą
   2. Project settings (⚙️) → General → "Your apps" → pridėkite Web app (</>) 
   3. Nukopijuokite jums parodytą firebaseConfig objektą ir įklijuokite vietoj žemiau esančio
   4. Firestore Database skiltyje spauskite "Create database" (pasirinkite bet kurį regioną)
   5. Authentication skiltyje → Sign-in method → įjunkite "Anonymous"
   6. Firestore → Rules skiltyje įklijuokite taisykles iš pridėto README.md failo
   ========================================================================== */
const firebaseConfig = null; /* <-- ĮKLIJUOKITE SAVO firebaseConfig OBJEKTĄ ČIA, pvz.:
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "jusu-projektas.firebaseapp.com",
  projectId: "jusu-projektas",
  storageBucket: "jusu-projektas.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abcdef123456"
};
*/

let fbEnabled = false;
let fbUser = null;
let fbDb = null;

function setSyncStatus(state){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  if(state === 'offline') { el.textContent = '📴'; el.title = 'Offline — duomenys saugomi tik šiame įrenginyje'; }
  else if(state === 'syncing') { el.textContent = '🔄'; el.title = 'Sinchronizuojama...'; }
  else if(state === 'synced') { el.textContent = '☁️'; el.title = 'Progresas sinchronizuotas debesyje'; }
  else if(state === 'local') { el.textContent = '💾'; el.title = 'Saugoma tik šiame įrenginyje (Firebase neįjungtas)'; }
}

async function initFirebase(){
  if(!firebaseConfig){ setSyncStatus('local'); return; }
  try{
    firebase.initializeApp(firebaseConfig);
    fbDb = firebase.firestore();
    await firebase.auth().signInAnonymously();
    firebase.auth().onAuthStateChanged(user => { fbUser = user; });
    await new Promise(resolve => {
      const unsub = firebase.auth().onAuthStateChanged(user => { if(user){ fbUser = user; unsub(); resolve(); } });
    });
    fbEnabled = true;
    setSyncStatus('synced');
  }catch(e){
    console.error('Firebase init failed, falling back to local storage only:', e);
    fbEnabled = false;
    setSyncStatus('offline');
  }
}
</script>

/* ============ HELPERS: sampling, shuffling ============ */

function shuffleArray(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function shuffleOptions(q){
  const idxs = q.opts.map((_,i)=>i);
  const shuffled = shuffleArray(idxs);
  const newOpts = shuffled.map(i=>q.opts[i]);
  if(q.multi){
    const newCorrect = q.correct.map(ci => shuffled.indexOf(ci)).sort((a,b)=>a-b);
    return Object.assign({}, q, {opts:newOpts, correct:newCorrect});
  }
  const newCorrect = shuffled.indexOf(q.correct);
  return Object.assign({}, q, {opts:newOpts, correct:newCorrect});
}
function arraysEqual(a,b){
  if(a.length !== b.length) return false;
  const sa = [...a].sort((x,y)=>x-y), sb = [...b].sort((x,y)=>x-y);
  return sa.every((v,i) => v === sb[i]);
}
function pickN(arr, n){
  const copy = [...arr]; const out = [];
  for(let i=0;i<n && copy.length;i++){ const idx = Math.floor(Math.random()*copy.length); out.push(copy.splice(idx,1)[0]); }
  return out;
}
function sampleQuestions(bank, mode){
  const easy = bank.filter(q=>q.diff==='lengvas');
  const med = bank.filter(q=>q.diff==='vidutinis');
  const hard = bank.filter(q=>q.diff==='sunkus');
  let target = mode === 'browse' ? 2 : 4;
  let selected = mode === 'browse' ? [...pickN(easy,1), ...pickN(med,1)] : [...pickN(easy,1), ...pickN(med,2), ...pickN(hard,1)];
  if(selected.length < target){
    const remaining = bank.filter(q => !selected.includes(q));
    selected = selected.concat(pickN(remaining, target - selected.length));
  }
  const diffRank = {lengvas:0, vidutinis:1, sunkus:2};
  selected.sort((a,b) => diffRank[a.diff] - diffRank[b.diff]);
  return selected.map(shuffleOptions);
}

  {h:'Pasirinkimas priklauso nuo tikslo', p:'Trumpalaikiams tikslams dažniau tinka paprasta maklerio sąskaita, o ilgalaikiam pensijos kaupimui — specializuotos, mokesčių lengvatas suteikiančios sąskaitos.'},

  {diff:'lengvas', q:'Kokiam tikslui dažniausiai naudojamos mokesčių atžvilgiu privilegijuotos sąskaitos?', opts:['Kasdienėms pirkinių išlaidoms','Ilgalaikiam pensijos taupymui','Valiutos keitimui','Paskolų grąžinimui'], correct:1, ex:'Šios sąskaitos dažniausiai skirtos skatinti ilgalaikį taupymą pensijai.'},
  {diff:'vidutinis', q:'Kodėl egzistuoja mokesčių atžvilgiu privilegijuotos sąskaitos?', opts:['Kad apsunkintų investavimą','Kad paskatintų ilgalaikį taupymą/investavimą','Nes jos privalomos visiems','Nes jos pakeičia maklerio sąskaitą visose situacijose'], correct:1, ex:'Tokios sąskaitos suteikia mokesčių lengvatas, skatinančias ilgalaikį kaupimą.'},

,

  {diff:'sunkus', q:'Investuotojas planuoja naudoti pinigus po 30 metų pensijai. Kokio tipo sąskaita jam greičiausiai būtų naudingiausia?', opts:['Ilgalaikio taupymo sąskaita su mokestinėmis lengvatomis','Trumpalaikė prekybos sąskaita be jokių apribojimų','Grynųjų pinigų sąskaita namuose','Bet kuri sąskaita, nes tipas nesvarbu'], correct:0, ex:'Ilgalaikiam tikslui geriausiai tinka sąskaita, sukurta būtent ilgalaikiam taupymui su mokestinėmis lengvatomis.'}

{id:'t11', title:'Sudėtinės palūkanos', theory:[
  {h:'Kas yra sudėtinės palūkanos', p:'Sudėtinės palūkanos — tai pelnas, gaunamas ne tik nuo pradinės investuotos sumos, bet ir nuo anksčiau uždirbto pelno. Todėl suma auga vis greičiau laikui bėgant, ne tiesiog tolygiai.'},
  {h:'Kodėl svarbu pradėti anksti', p:'Net nedidelė suma, investuota anksti, gali laikui bėgant užaugti daugiau nei didesnė suma, investuota vėliau — nes ji turi daugiau laiko sudėtinėms palūkanoms veikti. Šis principas dažnai vadinamas „laiko rinkoje“ pranašumu.'},
  {h:'Praktinis pavyzdys', p:'Turėdami €1000, augančius 10% per metus, po pirmų metų turėsite €1100. Antrus metus 10% skaičiuojama jau nuo €1100, ne nuo €1000, tad turėsite €1210 — ne €1200, kaip būtų be sudėtinio efekto.'}
], quiz:[
  {diff:'lengvas', q:'Kas yra sudėtinės palūkanos?', opts:['Fiksuotas metinis mokestis, mokamas bankui','Pelnas, gaunamas ne tik nuo pradinės sumos, bet ir nuo anksčiau uždirbto pelno','Vienkartinė premija, gaunama už investavimą','Speciali mokesčių lengvata pradedantiesiems investuotojams'], correct:1, ex:'Sudėtinės palūkanos reiškia, kad pelnas skaičiuojamas ir nuo ankstesnio pelno, ne vien nuo pradinės sumos.'},
  {diff:'lengvas', q:'Kodėl svarbu pradėti investuoti kuo anksčiau?', opts:['Nes vėliau investuoti draudžiama įstatymu','Nes ilgesnis laikas leidžia sudėtinėms palūkanoms stipriau paveikti sumos augimą','Nes ankstyvos investicijos visada saugesnės','Nes brokeriai ima mažesnius mokesčius jaunesniems investuotojams'], correct:1, ex:'Kuo ilgiau pinigai investuoti, tuo daugiau laiko turi sudėtinių palūkanų efektas.'},
  {diff:'vidutinis', q:'Investuotojas A pradeda investuoti 25 metų, investuotojas B — 35 metų. Abu investuoja tą pačią sumą kas mėnesį iki 65 metų. Kuris tikėtinai turės daugiau pinigų sulaukęs 65-erių?', opts:['Investuotojas B, nes investavo vėliau','Investuotojas A, nes turi 10 metų daugiau sudėtinių palūkanų augimo','Abu turės vienodai, nes suma ta pati','Neįmanoma nustatyti be daugiau duomenų'], correct:1, ex:'Papildomas dešimtmetis leidžia sudėtinėms palūkanoms žymiai labiau paveikti galutinę sumą.'},
  {diff:'vidutinis', q:'Kas nutinka sudėtinių palūkanų augimui, jei pelnas kasmet reinvestuojamas, o ne išimamas?', opts:['Augimas sustoja','Augimas pagreitėja','Augimas sulėtėja','Tai neturi jokios įtakos'], correct:1, ex:'Reinvestuotas pelnas tampa nauja baze, nuo kurios skaičiuojamas kitų metų pelnas — taip augimas pagreitėja.'},
  {diff:'sunkus', q:'Turite €1000, kurie kasmet auga 10%, ir pelną kasmet reinvestuojate. Apytiksliai kiek turėsite po 2 metų?', opts:['€1100','€1200','€1210','€1000'], correct:2, ex:'Pirmi metai: 1000×1.10=1100. Antri metai: 1100×1.10=1210 — antrų metų pelnas skaičiuojamas jau nuo €1100, ne nuo €1000.'}
,
  {diff:'lengvas', q:'Kas atsitinka, jei investicijos pelnas kasmet išimamas, o ne reinvestuojamas?', opts:['Sudėtinių palūkanų efektas neveikia, augimas lieka tiesinis','Augimas vis tiek pagreitėja taip pat','Tai neturi jokio skirtumo','Suma automatiškai dvigubėja kasmet'], correct:0, ex:'Neinvestavus pelno atgal, prarandama galimybė uždirbti nuo jau uždirbto pelno.'},
  {diff:'vidutinis', q:'Kodėl sudėtinės palūkanos kartais vadinamos „aštuntuoju pasaulio stebuklu“?', opts:['Nes jos gali eksponentiškai padidinti sumą per ilgą laiką, jei pelnas reinvestuojamas','Nes jos garantuoja pelną be jokios rizikos','Nes jos veikia tik per 8 metus','Nes tai tik populiarus, bet neteisingas posakis be pagrindo'], correct:0, ex:'Ilgainiui reinvestuotas pelnas gali sukurti eksponentinį, ne tiesinį augimą.'},
  {diff:'sunkus', q:'Kuri investicija po 20 metų tikėtinai duos daugiau, jei abi turi tą pačią 7% metinę grąžą: A) €5000 investuota vienkart dabar, B) tolygiai investuojama kelerius metus?', opts:['Priklauso nuo to, kada tiksliai investuojama kiekviena dalis — anksčiau investuoti pinigai turi daugiau laiko augti','Visada A, nes visa suma investuota iš karto turi didžiausią pranašumą','Visada B, nes reguliarus investavimas visada duoda geresnį rezultatą','Abi duos lygiai tą pačią sumą, nes bendra investuota suma vienoda'], correct:0, ex:'Kuo anksčiau pinigai investuoti, tuo ilgiau jie turi laiko augti sudėtinėmis palūkanomis.'}
]},
{id:'t12', title:'Infliacija ir jos poveikis investicijoms', theory:[
  {h:'Kas yra infliacija', p:'Infliacija — bendras prekių ir paslaugų kainų lygio kilimas laikui bėgant, mažinantis pinigų perkamąją galią. Tie patys pinigai ateityje nuperka mažiau nei šiandien.'},
  {h:'Kodėl tai svarbu investuotojui', p:'Jei investicijų grąža mažesnė už infliaciją, jūs realiai prarandate perkamąją galią, net jei nominali (matoma) suma auga. Todėl svarbu vertinti „realią“ grąžą — grąžą atėmus infliaciją.'},
  {h:'Praktinis pavyzdys', p:'Turėdami €10 000 grynaisiais, esant 4% metinei infliacijai, po metų jų reali perkamoji galia sumažėja iki maždaug €9 615 (10000 ÷ 1.04) — nors nominali suma nepasikeitė.'}
], quiz:[
  {diff:'lengvas', q:'Kas yra infliacija?', opts:['Akcijų kainos kritimas per vieną prekybos dieną','Bendras kainų lygio kilimas, mažinantis pinigų perkamąją galią','Banko palūkanų norma, taikoma indėliams','Valstybės mokesčių tarifas, taikomas pajamoms'], correct:1, ex:'Infliacija reiškia bendrą kainų augimą, dėl kurio pinigai perka mažiau.'},
  {diff:'lengvas', q:'Kas nutinka grynųjų pinigų perkamajai galiai, kai infliacija aukšta?', opts:['Ji didėja','Ji mažėja','Ji nesikeičia','Ji dvigubėja'], correct:1, ex:'Aukšta infliacija greičiau mažina pinigų perkamąją galią.'},
  {diff:'vidutinis', q:'Jūsų investicija uždirbo 3% per metus, o infliacija buvo 5%. Kas realiai atsitiko su jūsų perkamąja galia?', opts:['Ji padidėjo 8%, nes grąža ir infliacija sudedamos kartu','Ji sumažėjo, nes reali grąža neigiama (apie -2%)','Ji nepasikeitė, nes grąža ir infliacija viena kitą panaikino','Ji padidėjo 3%, atspindėdama vien nominalią grąžą'], correct:1, ex:'Reali grąža = nominali grąža − infliacija = 3% − 5% = −2%, taigi perkamoji galia sumažėjo.'},
  {diff:'vidutinis', q:'Kodėl vien grynųjų pinigų laikymas ilgą laiką gali būti rizikingas?', opts:['Nes grynieji pinigai gali fiziškai sugesti','Nes infliacija laikui bėgant sumažina jų perkamąją galią','Nes tai draudžiama įstatymu','Nes bankai atsisako priimti grynuosius'], correct:1, ex:'Grynieji pinigai, priešingai nei investicijos, dažniausiai neduoda grąžos, kompensuojančios infliaciją.'},
  {diff:'sunkus', q:'Turite €10 000 grynaisiais, infliacija 4% per metus. Apytiksliai kokia bus jų reali perkamoji galia po 1 metų, išreikšta šiandienos pinigais?', opts:['€10 400','€10 000','Apie €9 600','€9 000'], correct:2, ex:'10000 ÷ 1.04 ≈ €9 615 — pinigų suma nominaliai ta pati, bet perkamoji galia sumažėjo dėl infliacijos.'}
,
  {diff:'lengvas', q:'Kas paprastai didina infliaciją?', opts:['Bendras kainų kilimas prekėms ir paslaugoms','Akcijų kainos kritimas','Bankų palūkanų didėjimas visada','Investicijų grąžos didėjimas'], correct:0, ex:'Infliacija tiesiog reiškia bendrą kainų augimą ekonomikoje.'},
  {diff:'vidutinis', q:'Kodėl kai kurie investuotojai renkasi akcijas kaip apsaugą nuo infliacijos, o ne grynuosius?', opts:['Įmonės dažnai gali kelti kainas kartu su infliacija, išlaikydamos pelną','Akcijos niekada nekrenta infliacijos metu','Grynieji visada duoda didesnę grąžą nei akcijos','Infliacija neveikia akcijų rinkos'], correct:0, ex:'Įmonės dažnai perkelia augančias sąnaudas į kainas, taip iš dalies apsisaugodamos nuo infliacijos.'},
  {diff:'sunkus', q:'Jei infliacija ilgą laiką viršija jūsų investicijų nominalią grąžą, kas nutinka jūsų realiam turtui laikui bėgant?', opts:['Realus turtas (perkamoji galia) mažėja, net jei nominali suma auga','Realus turtas visada didėja, nepriklausomai nuo infliacijos','Infliacija neturi įtakos realiam turtui','Nominali suma visada sumažėja tiesiogiai'], correct:0, ex:'Kai reali grąža (nominali minus infliacija) neigiama, perkamoji galia mažėja net augant nominaliai sumai.'}
]},
{id:'t13', title:'Investavimo mokesčiai ir komisiniai', theory:[
  {h:'Sandorio mokesčiai', p:'Brokeriai dažnai ima komisinį mokestį už kiekvieną pirkimo ar pardavimo sandorį — tai gali būti fiksuota suma arba procentas nuo sandorio vertės.'},
  {h:'Valdymo mokesčiai', p:'Fondai ir ETF dažniausiai ima metinį valdymo mokestį, išreikštą procentu nuo investuotos sumos, kuris automatiškai atskaitomas — jo dažnai net nepamatysite tiesiogiai išrašyto.'},
  {h:'Kodėl mokesčiai svarbūs ilgame laikotarpyje', p:'Net nedidelis skirtumas mokesčiuose gali reikšmingai paveikti galutinę sumą per daugelį metų, nes mokesčiai „suvalgo“ dalį kiekvienerių metų sudėtinių palūkanų augimo.'},
  {h:'Praktinis pavyzdys', p:'Investuodami €10 000 su 1% metiniu mokesčiu, sumokėsite apie €100 per pirmus metus. Per 30 metų šis skirtumas, palyginti su 0.1% mokesčiu, dėl sudėtinių palūkanų gali sukurti tūkstančių eurų atotrūkį.'}
], quiz:[
  {diff:'lengvas', q:'Kas yra sandorio (komisinis) mokestis?', opts:['Metinis mokestis už sąskaitos turėjimą','Mokestis, imamas už kiekvieną pirkimo ar pardavimo sandorį','Valstybės mokestis nuo dividendų','Bauda už klaidingą pavedimą'], correct:1, ex:'Komisinis mokestis mokamas kiekvieną kartą perkant ar parduodant vertybinius popierius.'},
  {diff:'lengvas', q:'Kaip dažniausiai išreiškiamas fondo ar ETF valdymo mokestis?', opts:['Fiksuota suma per mėnesį','Metiniu procentu nuo investuotos sumos','Vienkartiniu mokesčiu perkant fondą','Mokesčiu už kiekvieną dieną'], correct:1, ex:'Valdymo mokestis paprastai nurodomas kaip metinis procentas nuo valdomo turto.'},
  {diff:'vidutinis', q:'Kodėl net nedidelis mokesčių skirtumas gali reikšmingai paveikti ilgalaikę investicijų sumą?', opts:['Nes mokesčiai kasmet didėja automatiškai','Nes skirtumas kaupiasi metai iš metų dėl sudėtinių palūkanų efekto','Nes didesni mokesčiai visada reiškia geresnį valdymą','Nes tai neturi jokios realios įtakos'], correct:1, ex:'Kiekvienais metais prarasta mokesčių dalis netenka progos toliau augti sudėtinėmis palūkanomis.'},
  {diff:'vidutinis', q:'Du fondai duoda tą pačią bendrą (bruto) grąžą, bet vienas ima 0.1% metinį mokestį, kitas — 1.5%. Kuris investuotojui ilgainiui paliks daugiau grynosios grąžos?', opts:['Fondas su 1.5% mokesčiu','Fondas su 0.1% mokesčiu','Abu vienodai, nes bruto grąža ta pati','Neįmanoma nustatyti'], correct:1, ex:'Žemesnis mokestis reiškia, kad daugiau bruto grąžos lieka investuotojui, ir šis skirtumas kaupiasi metai iš metų.'},
  {diff:'sunkus', q:'Turite €10 000, fondo metinis valdymo mokestis 1%. Kiek apytiksliai sumokėsite mokesčio per pirmus metus?', opts:['€10','€100','€1000','€1'], correct:1, ex:'1% nuo €10 000 = €100.'}
,
  {diff:'lengvas', q:'Kaip vadinamas mokestis, imamas kiekvieną kartą perkant ar parduodant akciją?', opts:['Sandorio (komisinis) mokestis','Valdymo mokestis','Dividendų mokestis','Infliacijos mokestis'], correct:0, ex:'Tai sandorio (komisinis) mokestis, mokamas už kiekvieną pirkimo/pardavimo veiksmą.'},
  {diff:'vidutinis', q:'Kodėl žemų mokesčių indeksiniai fondai populiarūs tarp ilgalaikių investuotojų?', opts:['Žemi mokesčiai palieka daugiau grąžos investuotojui per ilgą laiką','Jie visada duoda didžiausią įmanomą grąžą','Jie neturi jokios rizikos','Jie draudžiami mažiems investuotojams'], correct:0, ex:'Mažesni mokesčiai reiškia, kad investuotojui lieka didesnė dalis bendros grąžos.'},
  {diff:'sunkus', q:'Du investuotojai investuoja po €10000 30 metų su ta pačia 7% bruto grąža, bet vienas moka 0.2% metinį mokestį, kitas 2%. Kuris veiksnys labiausiai paaiškina, kodėl jų galutinės sumos labai skirsis?', opts:['Mokesčių skirtumas kaupiasi per sudėtinių palūkanų efektą per 30 metų','Abu turės identišką sumą, nes bruto grąža vienoda','Mokesčiai neturi įtakos, jei laikotarpis ilgas','Skirtumas bus nereikšmingas, mažiau nei 1%'], correct:0, ex:'Kasmetinis mokesčių skirtumas per dešimtmečius sudėtinai susikaupia į labai reikšmingą galutinės sumos skirtumą.'}
]},
{id:'t14', title:'Akcijų ir obligacijų porūšiai', theory:[
  {h:'Paprastosios vs privilegijuotosios akcijos', p:'Paprastosios akcijos suteikia balsavimo teisę įmonės sprendimuose. Privilegijuotosios akcijos dažnai suteikia pirmumą gaunant dividendus, tačiau paprastai be balsavimo teisės.'},
  {h:'Obligacijų tipai', p:'Valstybės obligacijos paprastai laikomos saugiausiomis. Savivaldybių obligacijas išleidžia vietos valdžios institucijos. Įmonių obligacijų rizika priklauso nuo konkrečios įmonės finansinio patikimumo — ji gali labai skirtis.'},
  {h:'Praktinis pavyzdys', p:'Investuotojas, norintis pastovesnių dividendų ir pasiruošęs atsisakyti balsavimo teisės, rinktųsi privilegijuotąsias akcijas. Investuotojas, siekiantis maksimalios įtakos įmonės sprendimams, rinktųsi paprastąsias akcijas.'}
], quiz:[
  {diff:'lengvas', q:'Kuo paprastosios akcijos skiriasi nuo privilegijuotųjų?', opts:['Paprastosios suteikia balsavimo teisę, privilegijuotosios dažnai ne, bet turi pirmumą dividendams','Privilegijuotosios akcijos visada yra brangesnės','Paprastosios akcijos niekada nemoka dividendų','Privilegijuotosios akcijos negali būti parduodamos biržoje'], correct:0, ex:'Paprastosios akcijos suteikia balsavimo teisę, o privilegijuotosios dažnai turi pirmumą gaunant dividendus.'},
  {diff:'lengvas', q:'Kurios obligacijos paprastai laikomos saugiausiomis?', opts:['Įmonių obligacijos','Valstybės obligacijos','Savivaldybių obligacijos','Visos vienodai saugios'], correct:1, ex:'Valstybės obligacijos, remiamos valstybės mokesčių surinkimo galios, paprastai laikomos saugiausiomis.'},

  {diff:'lengvas', q:'Ką reiškia ROE?', opts:['Rinkos vertės augimas','Nuosavo kapitalo grąža','Bendra įmonės skola','Metinė infliacija'], correct:1, ex:'ROE — Return on Equity, nuosavo kapitalo grąža.'},

  {diff:'lengvas', q:'Kodėl per didelė skola yra rizikinga įmonei?', opts:['Nes skola visada nelegali','Nes ji padidina bankroto riziką sunkiais laikais','Nes skola visada didina akcijos kainą','Nes skola panaikina visus mokesčius'], correct:1, ex:'Didelė skolų našta padidina finansinį pažeidžiamumą sunkmečiu.'},

  {h:'Bendrasis pelnas', p:'Bendrasis pelnas (gross profit) = pajamos atėmus tiesiogines prekių ar paslaugų gamybos sąnaudas (žaliavos, tiesioginis darbas ir pan.).'},

  {diff:'lengvas', q:'Kaip išreiškiama bendroji pelno marža?', opts:['Eurais','Procentais nuo pajamų','Akcijų skaičiumi','Metais'], correct:1, ex:'Bendroji pelno marža išreiškiama procentine dalimi nuo pajamų.'},
  {diff:'lengvas', q:'Kas NEĮTRAUKIAMA į tiesiogines gamybos sąnaudas (COGS)?', opts:['Rinkodaros ir administravimo išlaidos','Žaliavų kaina','Tiesioginis gamybos darbas','Gamybos medžiagos'], correct:0, ex:'Rinkodara ir administravimas yra netiesioginės išlaidos, ne COGS dalis.'},

  {diff:'vidutinis', q:'Kodėl bendroji pelno marža skiriasi nuo grynojo pelno maržos?', opts:['Bendroji marža skaičiuojama prieš atskaitant administravimo, rinkodaros ir kitas netiesiogines išlaidas','Jos yra visiškai identiškos ir skaičiuojamos vienodai','Grynojo pelno marža visada didesnė už bendrąją maržą','Bendroji marža įskaičiuoja mokesčius, o grynojo pelno — ne'], correct:0, ex:'Bendroji marža rodo pelningumą prieš netiesiogines išlaidas, o grynoji — po visų išlaidų ir mokesčių.'},

{id:'t8', title:'Apyvartinis kapitalas', theory:[
  {h:'Apibrėžimas', p:'Apyvartinis kapitalas (working capital) = trumpalaikis turtas atėmus trumpalaikius įsipareigojimus. Jis parodo, ar įmonė turi pakankamai likvidžių išteklių kasdienėms operacijoms.'},
  {h:'Ką jis rodo', p:'Teigiamas apyvartinis kapitalas rodo, kad įmonė gali padengti artimiausius įsipareigojimus. Neigiamas gali signalizuoti trumpalaikio likvidumo problemas, net jei ilgalaikė padėtis atrodo gerai.'},
  {h:'Praktinis pavyzdys', p:'Įmonės trumpalaikis turtas €5 mln., trumpalaikiai įsipareigojimai €3 mln. Apyvartinis kapitalas = 5 − 3 = €2 mln. — teigiama reikšmė, rodanti pakankamą trumpalaikį likvidumą.'}
], quiz:[
  {diff:'lengvas', q:'Kaip apskaičiuojamas apyvartinis kapitalas?', opts:['Turtas atėmus visus įsipareigojimus','Trumpalaikis turtas atėmus trumpalaikius įsipareigojimus','Pajamos atėmus sąnaudas','Akcijos kaina padalinta iš EPS'], correct:1, ex:'Apyvartinis kapitalas = trumpalaikis turtas − trumpalaikiai įsipareigojimai.'},
  {diff:'lengvas', q:'Kas priskiriama trumpalaikiam turtui?', opts:['Grynieji pinigai ir atsargos, kurias planuojama parduoti/panaudoti per metus','Pastatai, naudojami dešimtmečius verslo veikloje','Ilgalaikės paskolos, gautos iš banko investicijoms','Prekės ženklo vertė, sukaupta per metus'], correct:0, ex:'Trumpalaikis turtas apima grynuosius ir atsargas, planuojamas panaudoti per artimiausius metus.'},
  {diff:'lengvas', q:'Ką rodo teigiamas apyvartinis kapitalas?', opts:['Įmonė bankrutuoja, nepaisant teigiamos šios reikšmės','Įmonė turi pakankamai išteklių trumpalaikiams įsipareigojimams padengti','Įmonė neturi jokių skolų, nepriklausomai nuo rodiklio dydžio','Akcijos kaina tikrai kils per artimiausią savaitę'], correct:1, ex:'Teigiamas apyvartinis kapitalas reiškia pakankamą trumpalaikį likvidumą.'},
  {diff:'vidutinis', q:'Ką galėtų reikšti neigiamas apyvartinis kapitalas?', opts:['Įmonė visada bankrutuos per artimiausią savaitę','Įmonė gali turėti sunkumų padengti artimiausius trumpalaikius įsipareigojimus','Tai visada teigiamas, sveikas finansinis ženklas','Tai neturi jokios reikšmės vertinant įmonę'], correct:1, ex:'Neigiamas apyvartinis kapitalas signalizuoja galimus trumpalaikio likvidumo sunkumus.'},
  {diff:'vidutinis', q:'Kodėl apyvartinis kapitalas svarbus vertinant trumpalaikį įmonės finansinį stabilumą?', opts:['Jis parodo vien tik ilgalaikį įmonės pelningumą','Jis parodo likvidumą kasdienei veiklai, ne vien ilgalaikį pelningumą','Jis tiesiogiai nustato įmonės akcijos kainą','Jis parodo būsimų dividendų dydį akcininkams'], correct:1, ex:'Apyvartinis kapitalas fokusuojasi į trumpalaikį likvidumą, atskirai nuo bendro pelningumo.'},
  {diff:'sunkus', q:'Įmonės trumpalaikis turtas €5 mln., trumpalaikiai įsipareigojimai €3 mln. Koks apyvartinis kapitalas ir ką tai rodo?', opts:['€8 mln., neigiamas signalas','€2 mln., teigiamas, rodo pakankamą likvidumą','−€2 mln., rizikingas signalas','€3 mln., neutralu'], correct:1, ex:'Apyvartinis kapitalas = 5−3 = €2 mln. Teigiama reikšmė rodo pakankamą trumpalaikį likvidumą.'},
  {diff:'sunkus', q:'Įmonės apyvartinis kapitalas smarkiai sumažėjo per vienerius metus, nors pardavimai augo. Kokia viena galima priežastis?', opts:['Įmonė galėjo greitai didinti trumpalaikius įsipareigojimus (pvz. skolas tiekėjams) sparčiau nei trumpalaikį turtą','Pardavimų augimas visada didina apyvartinį kapitalą tiksliai proporcingai','Tai statistiškai visiškai neįmanoma situacija','Apyvartinis kapitalas niekada nėra susijęs su pardavimais'], correct:0, ex:'Sparčiai augantys trumpalaikiai įsipareigojimai gali sumažinti apyvartinį kapitalą net augant pardavimams.'}
,
  {diff:'vidutinis', q:'Kodėl teigiamas, bet per didelis apyvartinis kapitalas taip pat gali nebūti idealus?', opts:['Per daug pinigų „užšaldyta“ trumpalaikiame turte gali reikšti neefektyvų kapitalo panaudojimą','Didesnis apyvartinis kapitalas visada geriau be jokių išlygų','Per didelis apyvartinis kapitalas visada reiškia bankrotą','Tai neturi jokios praktinės reikšmės'], correct:0, ex:'Perteklinis apyvartinis kapitalas gali reikšti, kad kapitalas galėtų būti panaudotas efektyviau kitur.'}
]},
{id:'t9', title:'Laisvas pinigų srautas', theory:[
  {h:'Apibrėžimas', p:'Laisvas pinigų srautas (free cash flow) = veiklos pinigų srautas atėmus kapitalo investicijas (pvz., įrangos ar pastatų pirkimą, reikalingą verslui palaikyti ar plėsti).'},
  {h:'Kodėl svarbu', p:'Tai realūs pinigai, likę po būtinų investicijų į verslo palaikymą — juos įmonė gali panaudoti dividendams, skolos grąžinimui ar tolesniam augimui, todėl investuotojai jį vertina itin aukštai.'},
  {h:'Praktinis pavyzdys', p:'Įmonės veiklos pinigų srautas €10 mln., kapitalo investicijos €7 mln. Laisvas pinigų srautas = 10 − 7 = €3 mln. — tai suma, kurią įmonė gali laisvai panaudoti dividendams ar skolos mažinimui.'}
], quiz:[

  {diff:'lengvas', q:'Kam įmonė gali panaudoti laisvą pinigų srautą?', opts:['Tik atlyginimams mokėti','Dividendams, skolos grąžinimui, tolesniam augimui','Tik mokesčiams sumokėti','Jis negali būti niekam panaudotas'], correct:1, ex:'Laisvas pinigų srautas suteikia lankstumo — dividendams, skolų mažinimui ar investicijoms į augimą.'},

  {diff:'sunkus', q:'Įmonės veiklos pinigų srautas €10 mln., kapitalo investicijos €7 mln. Koks laisvas pinigų srautas?', opts:['€17 mln.','€3 mln.','€10 mln.','€7 mln.'], correct:1, ex:'Laisvas pinigų srautas = 10 − 7 = €3 mln.'}
,

  {diff:'sunkus', q:'Growth įmonės akcijos kaina jau atspindi labai optimistiškus augimo lūkesčius (P/E=80). Kas nutinka, jei įmonė paskelbia „tik gerus“, o ne „puikius“ rezultatus?', opts:['Kaina gali kristi net esant geriems rezultatams','Kaina visada kils, jei rezultatai geri','Rezultatai neturi jokios įtakos tokiai akcijai','P/E rodiklis šiuo atveju nesvarbus'], correct:0, ex:'Kai lūkesčiai itin aukšti, net „geri“ (bet ne „puikūs“) rezultatai gali nuvilti rinką ir sukelti kritimą.'}
,
  {diff:'lengvas', q:'Kokį pajamų/pelno augimo tempą paprastai ieško growth investuotojas?', opts:['Sparčiau augantį nei rinkos vidurkis','Lėčiau augantį nei rinkos vidurkis','Nulinį augimą','Mažėjantį augimą'], correct:0, ex:'Growth investuotojai ieško sparčiau nei vidutiniškai augančių įmonių.'},
  {diff:'vidutinis', q:'Kodėl growth investavimas dažnai laikomas rizikingesniu nei value investavimas?', opts:['Kaina jau atspindi optimistiškus lūkesčius','Growth įmonės visada turi mažesnę riziką nei value įmonės','Growth investavimas niekada nesusijęs su rizika','Growth investavimas visada duoda mažesnę grąžą'], correct:0, ex:'Aukšti lūkesčiai kainoje reiškia didesnę riziką, jei jie neišsipildo.'},
  {diff:'sunkus', q:'Dvi growth įmonės auga vienodu tempu, bet vienos P/E=40, kitos P/E=100. Kuri, remiantis vien šia informacija, atrodo rizikingesnė investicijų prasme?', opts:['Įmonė su P/E=100','Įmonė su P/E=40, nes žemesnis P/E visada rizikingesnis','Abi vienodai rizikingos, nes augimo tempas identiškas','P/E neturi jokios įtakos rizikai augimo įmonėms'], correct:0, ex:'Aukštesnis P/E reiškia, kad rinka jau įkainojo aukštesnius lūkesčius, paliekant mažiau erdvės nuvylimui.'}

{id:'t3', title:'Dividendų strategija', theory:[

  {diff:'vidutinis', q:'Kodėl dividendų strategija dažnai patraukli investuotojams, artimiems pensijai?', opts:['Ji suteikia reguliarų pajamų srautą, mažiau priklausantį nuo kasdienių kainos svyravimų','Ji visada duoda didžiausią bendrą grąžą rinkoje','Ji visiškai panaikina bet kokią investavimo riziką','Ji tinka tik jauniems investuotojams su ilgu horizontu'], correct:0, ex:'Reguliarios dividendų pajamos gali būti naudingos investuotojams, kuriems svarbus pastovus pajamų srautas.'},

{id:'t4', title:'Indeksinis investavimas', theory:[

  {h:'Kodėl tai populiaru', p:'Dauguma aktyviai valdomų fondų ilgainiui neaplenkia rinkos vidurkio po mokesčių, tad pasyvus sekimas dažnai racionalus pasirinkimas daugumai investuotojų.'},
  {h:'Praktinis pavyzdys', p:'Du fondai investuoja €20 000 30 metų su ta pačia 7% bruto grąža — vienas ima 0.1% metinį mokestį, kitas 1.2%. Šis, atrodytų mažas, skirtumas per 30 metų dėl sudėtinių palūkanų efekto sukuria žymiai didesnį atotrūkį galutinėje sumoje.'}

  {diff:'vidutinis', q:'Kodėl daugelis ilgalaikių investuotojų renkasi indeksinius fondus vietoj aktyvaus akcijų atrinkimo?', opts:['Daugelis aktyviai valdomų fondų ilgainiui neaplenkia rinkos vidurkio po mokesčių','Aktyvus valdymas visada duoda geresnius rezultatus','Indeksiniai fondai teisiškai privalomi visiems','Aktyvus valdymas draudžiamas mažiems investuotojams'], correct:0, ex:'Tyrimai rodo, kad dauguma aktyviai valdomų fondų ilgainiui atsilieka nuo indekso po mokesčių.'},

,

{id:'t5', title:'DCA vs vienkartinė investicija', theory:[
  {h:'Kas yra DCA', p:'Dollar-cost averaging (DCA) — investuoti fiksuotą sumą reguliariais intervalais, nepriklausomai nuo rinkos kainos, vietoj bandymo „pataikyti“ į tinkamą momentą.'},
  {h:'Svarbus niuansas', p:'Jei jau turite pinigų sumą, tyrimai (pvz. Vanguard) rodo, kad vienkartinis investavimas iš karto statistiškai laimi apie 2/3 atvejų, nes pinigai anksčiau patenka į rinką ir turi daugiau laiko augti. Tačiau DCA nauda daugumai žmonių yra elgsenos, ne matematinė — ji skatina nuoseklumą, o dauguma žmonių investuoja iš gaunamų pajamų, ne iš turimos sumos.'},
  {h:'Praktinis pavyzdys', p:'Investuotojas paveldi €50 000. Statistiškai vienkartinis investavimas dažniau laimi, bet DCA (paskirstant per 12 mėnesių) gali būti racionalus pasirinkimas, jei investuotojui svarbesnis emocinis komfortas ir mažesnis regreto jausmas nei grynas matematinis optimalumas.'}
], quiz:[
  {diff:'lengvas', q:'Kas yra dollar-cost averaging (DCA)?', opts:['Fiksuotos sumos investavimas reguliariais intervalais, nepriklausomai nuo kainos','Visos turimos sumos investavimas vienu kartu','Investavimas tik tada, kai kaina krenta','Investavimas tik tada, kai kaina kyla'], correct:0, ex:'DCA reiškia reguliarų, fiksuotos sumos investavimą, nepriklausomai nuo kainos.'},
  {diff:'lengvas', q:'Jei jau turite pinigų sumą, ką dažniausiai rodo tyrimai apie vienkartinį investavimą vs DCA?', opts:['Vienkartinis investavimas statistiškai laimi apie 2/3 atvejų','DCA visada laimi 100% atvejų','Abu metodai visada duoda identišką rezultatą','Vienkartinis investavimas visada pralaimi'], correct:0, ex:'Tyrimai (pvz. Vanguard) rodo, kad turint sumą, vienkartinis investavimas dažniau statistiškai laimi.'},
  {diff:'vidutinis', q:'Kodėl vienkartinis investavimas dažniau statistiškai laimi, jei jau turite pinigų?', opts:['Anksčiau investuoti pinigai turi daugiau laiko rinkoje augti, o rinkos ilgainiui dažniau kyla','Nes DCA visada reiškia didesnius mokesčius','Nes vienkartinis investavimas teisiškai privalomas','Nes DCA yra nelegalus daugelyje šalių'], correct:0, ex:'Kuo anksčiau pinigai investuoti, tuo ilgiau jie turi laiko augti, o rinkos istoriškai dažniau kyla nei krenta.'},
  {diff:'vidutinis', q:'Kodėl DCA vis tiek naudingas daugumai paprastų žmonių, nepaisant statistikos?', opts:['Dauguma neturi didelės sumos iš karto, o investuoja palaipsniui iš pajamų; DCA taip pat padeda išvengti bandymo atspėti rinkos momentą','DCA visada duoda didesnę grąžą nei vienkartinis investavimas iš karto','DCA visiškai panaikina bet kokią investavimo riziką','DCA yra vienintelis legalus ir leidžiamas investavimo būdas'], correct:0, ex:'DCA elgsenos nauda — disciplina ir market-timing rizikos vengimas — svarbi žmonėms be didelės sumos iš karto.'},
  {diff:'sunkus', q:'Investuotojas paveldėjo €50000 ir svarsto, ar investuoti iš karto, ar per 12 mėnesių dalimis. Remiantis tyrimais, kodėl DCA vis tiek gali būti racionalus pasirinkimas šiam konkrečiam investuotojui, nepaisant statistikos?', opts:['DCA gali būti racionalus, jei investuotojui svarbesnis emocinis komfortas ir rizikos sumažinimas, o ne vien matematinis optimalumas','DCA visada yra matematiškai geresnis pasirinkimas turint sumą','Vienkartinis investavimas visada yra teisiškai draudžiamas didelėms sumoms','Nėra jokio realaus skirtumo tarp šių dviejų metodų'], correct:0, ex:'Nors statistiškai vienkartinis investavimas dažniau laimi, DCA gali sumažinti emocinę naštą ir regreto riziką, kas kai kuriems investuotojams svarbiau nei grynas matematinis optimalumas.'}
,
  {diff:'lengvas', q:'Kas priešinga vienkartiniam investavimui, kalbant apie investavimo momento pasirinkimą?', opts:['Dollar-cost averaging (DCA)','Value investing','Day trading','Short selling'], correct:0, ex:'DCA yra alternatyva vienkartiniam investavimui, paskirstant investavimą laike.'},
  {diff:'vidutinis', q:'Kodėl bandymas „pataikyti“ į tobulą rinkos momentą (market timing) laikomas sunkiu net profesionaliems investuotojams?', opts:['Ateities kainų judėjimo tiksliai nuspėti praktiškai neįmanoma net su geriausia analize','Market timing visada lengvai pasiekiamas su pakankama patirtimi','Rinkos momentus galima tiksliai nuspėti naudojant vien vieną indikatorių','Profesionalūs investuotojai niekada nebando prognozuoti rinkos'], correct:0, ex:'Tikslus rinkos momento nuspėjimas praktiškai labai sunkus net patyrusiems investuotojams.'},
  {diff:'sunkus', q:'Investuotojas su nuolatinėmis mėnesinėmis pajamomis investuoja fiksuotą sumą kas mėnesį nepriklausomai nuo kainos, o ne bando spėti geriausią momentą. Kodėl tai praktiškai tas pats, kas DCA, net jei investuotojas apie tai negalvoja formaliai?', opts:['Reguliarus, fiksuotos sumos investavimas nepriklausomai nuo kainos yra tiksliai DCA apibrėžimas, nesvarbu, ar investuotojas naudoja šį terminą','Tai visiškai skirtingos, nesusijusios investavimo strategijos','Tai DCA tik tada, jei investuotojas sąmoningai vartoja šį terminą','Reguliarus investavimas iš pajamų niekada nelaikomas DCA strategija'], correct:0, ex:'DCA apibrėžimas tiksliai atitinka reguliarų, fiksuotos sumos investavimą nepriklausomai nuo kainos — terminologija čia nesvarbi.'}
]},
{id:'t6', title:'Day trading vs ilgalaikis investavimas — realybė', theory:[
  {h:'Statistika', p:'Akademiniai tyrimai (Brazilijos, Taivano, JAV rinkų) rodo, kad didžioji dauguma (70–97%, priklausomai nuo tyrimo) aktyvių day treiderių ilgainiui praranda pinigus.'},
  {h:'Kodėl taip nutinka', p:'Sandorių kaštai kaupiasi, konkuruojama su instituciniais investuotojais su geresne informacija/technologija, trūksta statistinio pranašumo, ir dažnos emocinės klaidos (per didelis pasitikėjimas, keršto prekyba).'},
  {h:'Preživimo iliuzija', p:'Matomos tik retos sėkmės istorijos, o tūkstančiai pralaimėjusiųjų tyliai dingsta iš akiračio, iškreipdami bendrą įspūdį apie realias galimybes.'},
  {h:'Praktinis pavyzdys', p:'Brazilijos rinkos tyrimas parodė, kad iš žmonių, kurie day treidino 300+ dienų, 97% prarado pinigus, o tik 1,1% uždirbo daugiau nei minimalų atlyginimą. Socialiniuose tinkluose matote tą 1,1%, o ne 97%.'}
], quiz:[
  {diff:'lengvas', q:'Remiantis akademiniais tyrimais, kokia dalis aktyvių day treiderių ilgainiui praranda pinigus?', opts:['Didžioji dauguma (70%+)','Mažiau nei 5%','Lygiai pusė','Beveik niekas'], correct:0, ex:'Keli akademiniai tyrimai rodo, kad didžioji dauguma aktyvių day treiderių ilgainiui praranda pinigus.'},
  {diff:'lengvas', q:'Kas yra „preživimo iliuzija“ day trading kontekste?', opts:['Matomos tik sėkmės istorijos, o dauguma pralaimėjusiųjų lieka nematomi','Reiškinys, kai visi treideriai visada uždirba','Statistinis metodas pelnui skaičiuoti','Oficialus reguliavimo terminas'], correct:0, ex:'Matomos tik retos sėkmės istorijos, iškreipiančios bendrą įspūdį apie realias galimybes.'},

function samplePretest(){
  const easy = PRETEST_QUESTIONS.filter(q=>q.diff==='lengvas');
  const med = PRETEST_QUESTIONS.filter(q=>q.diff==='vidutinis');
  const hard = PRETEST_QUESTIONS.filter(q=>q.diff==='sunkus');
  let selected = [...pickN(easy,2), ...pickN(med,2), ...pickN(hard,1)];
  const diffRank = {lengvas:0, vidutinis:1, sunkus:2};
  selected.sort((a,b) => diffRank[a.diff]-diffRank[b.diff]);
  return selected.map(shuffleOptions);
}

async function saveProgress(){
  const payload = Object.assign({}, progress, {_meta: meta});
  try{ localStorage.setItem('academy_progress_v2', JSON.stringify(payload)); }catch(e){}
  if(fbEnabled && fbDb && fbUser){
    setSyncStatus('syncing');
    try{
      await fbDb.collection('academy_progress').doc(fbUser.uid).set(payload);
      setSyncStatus('synced');
    }catch(e){
      console.error('Firebase save failed, progress stays saved locally:', e);
      setSyncStatus('offline');
    }
  }
}
async function loadProgress(){
  try{
    const local = localStorage.getItem('academy_progress_v2');
    if(local) applySavedProgress(JSON.parse(local));
  }catch(e){}
  if(fbEnabled && fbDb && fbUser){
    try{
      const doc = await fbDb.collection('academy_progress').doc(fbUser.uid).get();
      if(doc.exists){
        applySavedProgress(doc.data());
        localStorage.setItem('academy_progress_v2', JSON.stringify(Object.assign({}, progress, {_meta:meta})));
      }
      setSyncStatus('synced');
    }catch(e){
      console.error('Firebase load failed, using local data:', e);
      setSyncStatus('offline');
    }
  }
}
function applySavedProgress(saved){
  if(!saved) return;
  if(saved._meta) meta = Object.assign(meta, saved._meta);
  BUILT_CHAIN.forEach(id => {
    if(saved[id]){
      Object.keys(progress[id].topics).forEach(k => { if(saved[id].topics && saved[id].topics[k]) progress[id].topics[k] = saved[id].topics[k]; });
      if(saved[id].caseStudies){
        // Merge by index instead of overwriting wholesale — protects against
        // case studies added to a module after this progress was saved.
        progress[id].caseStudies.forEach((defaultEntry, idx) => {
          if(saved[id].caseStudies[idx]) progress[id].caseStudies[idx] = saved[id].caseStudies[idx];
        });
      }
      if(saved[id].practice) progress[id].practice = saved[id].practice;
    }
  });
}

function fmt(n){ return '€' + n.toLocaleString('lt-LT',{maximumFractionDigits:0}); }

function topicsAvg(moduleId){
  const topics = MODULE_CONTENT[moduleId].topics;
  const scores = topics.map(t => progress[moduleId].topics[t.id].bestScore).filter(s => s !== null);
  if(scores.length === 0) return 0;
  return scores.reduce((a,b)=>a+b,0) / scores.length;
}
function allTopicsDone(moduleId){
  return MODULE_CONTENT[moduleId].topics.every(t => progress[moduleId].topics[t.id].bestScore !== null);
}
function caseStudiesAvg(moduleId){
  const arr = progress[moduleId].caseStudies;
  const doneScores = arr.filter(cs=>cs.done).map(cs=>cs.score);
  if(doneScores.length===0) return 0;
  return doneScores.reduce((a,b)=>a+b,0)/doneScores.length;
}
function allCaseStudiesDone(moduleId){
  return progress[moduleId].caseStudies.every(cs => cs.done);
}
function capitalRange(){
  return meta.mode === 'browse' ? {base:3000, bonus:2000} : {base:5000, bonus:5000};
}
function moduleStipendija(moduleId){
  const tAvg = topicsAvg(moduleId);
  const cAvg = caseStudiesAvg(moduleId);
  const combined = allCaseStudiesDone(moduleId) ? (tAvg*0.6 + cAvg*0.4) : tAvg;
  const r = capitalRange();
  return Math.round(r.base + (combined/100)*r.bonus);
}
function moduleFullyDone(moduleId){
  return allTopicsDone(moduleId) && allCaseStudiesDone(moduleId) && progress[moduleId].practice.done;
}
function isModuleUnlocked(moduleId){
  const idx = BUILT_CHAIN.indexOf(moduleId);
  if(idx <= 0) return true;
  return moduleFullyDone(BUILT_CHAIN[idx-1]);
}
function overallStipendija(){
  const doneVals = BUILT_CHAIN.filter(id => moduleFullyDone(id)).map(id => moduleStipendija(id));
  const r = capitalRange();
  if(doneVals.length) return Math.round(doneVals.reduce((a,b)=>a+b,0)/doneVals.length);
  const activeId = BUILT_CHAIN.find(id => isModuleUnlocked(id) && !moduleFullyDone(id));
  if(activeId) return Math.round(r.base + (topicsAvg(activeId)/100)*r.bonus*0.5);
  return r.base;
}

      if(btn) btn.addEventListener('click', () => { view = {name:'syllabus'}; render(); });
    }
  }
}
function renderInner(){
  clearInterval(timerInterval);
  const main = document.getElementById('main');
  if(!meta.mode){ renderModeSelect(main); return; }
  if(meta.preTestScore === null && !meta.preTestSkipped){ renderPreTest(main); return; }
  renderHeader();
  if(view.name === 'syllabus') renderSyllabus(main);
  else if(view.name === 'module') renderModule(main);
  else if(view.name === 'topic') renderTopic(main);
  else if(view.name === 'casestudy') renderCaseStudy(main);
  else if(view.name === 'practice') renderPractice(main);
  else if(view.name === 'transcript') renderTranscript(main);
  else if(view.name === 'certificate') renderCertificate(main);
  else if(view.name === 'review') renderReviewMode(main);
}

/* ============ REVIEW MODE (kartojimas) ============ */

function renderReviewMode(main){
  const pool = [];
  BUILT_CHAIN.forEach(id => {
    MODULE_CONTENT[id].topics.forEach(t => {
      if(progress[id].topics[t.id].bestScore !== null){
        t.quiz.forEach(q => pool.push(q));
      }
    });
  });
  if(pool.length < 3){
    main.innerHTML = `<div class="page-title">🔄 Kartojimas</div>
      <div class="page-sub">Baikite bent kelias temas, kad galėtumėte kartoti jau išmoktas žinias.</div>
      <div class="content-panel"><p style="color:var(--muted);font-size:13.5px;">Kai baigsite kelias temas, čia galėsite bet kada pasitikrinti, ar dar atsimenate anksčiau išmoktą medžiagą — atsitiktinai parenkami klausimai iš visų jau baigtų temų.</p></div>`;
    return;
  }
  const questions = pickN(pool, Math.min(5, pool.length)).map(shuffleOptions);
  let selections = new Array(questions.length).fill(null);
  let submitted = false;
  const lastReview = meta.lastReviewDate ? new Date(meta.lastReviewDate).toLocaleDateString('lt-LT') : null;

  function draw(){
    let html = `<div class="page-title">🔄 Kartojimas</div>
      <div class="page-sub">Atsitiktiniai klausimai iš jau baigtų temų — nepaveikia jūsų oficialių rezultatų.${lastReview ? ' Paskutinį kartą kartojote: '+lastReview+'.' : ''}</div>
      <div class="content-panel">`;
    questions.forEach((q,qi) => {
      html += `<div class="quiz-q"><p class="qtext">${qi+1}. ${q.q}</p>`;
      q.opts.forEach((opt,oi) => {
        let cls = 'qopt';
        if(selections[qi]===oi) cls += ' selected';
        if(submitted){ if(oi===q.correct) cls += ' correct'; else if(selections[qi]===oi) cls += ' incorrect'; }
        html += `<button class="${cls}" data-qi="${qi}" data-oi="${oi}" ${submitted?'disabled':''}>${opt}</button>`;
      });
      if(submitted) html += `<div class="explain">${q.ex}</div>`;
      html += `</div>`;
    });
    if(!submitted){
      const allAnswered = selections.every(s=>s!==null);
      html += `<button class="submit-btn" id="revSubmitBtn" ${allAnswered?'':'disabled'}>Pateikti</button>`;
    } else {
      const correctCount = selections.filter((s,i)=>s===questions[i].correct).length;
      const pct = Math.round((correctCount/questions.length)*100);
      meta.lastReviewDate = Date.now();
      saveProgress();
      html += `<div class="quiz-result"><div class="score" style="color:${pct>=70?'var(--gain)':'var(--gold)'}">${correctCount}/${questions.length}</div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">${pct>=70 ? 'Puikiai atsimenate!' : 'Verta peržiūrėti šias temas dar kartą.'}</div>
        <button class="continue-btn" id="revAgainBtn">Kartoti dar kartą</button>
        <button class="continue-btn" id="revDoneBtn" style="background:var(--bg-card);color:var(--ink);border:1px solid var(--border);margin-left:8px;">Grįžti į silabusą</button></div>`;
    }
    html += `</div>`;
    main.innerHTML = html;
    if(!submitted){
      main.querySelectorAll('.qopt').forEach(btn => btn.addEventListener('click', () => { selections[parseInt(btn.dataset.qi)]=parseInt(btn.dataset.oi); draw(); }));
      const sb = document.getElementById('revSubmitBtn'); if(sb) sb.addEventListener('click', () => { submitted=true; draw(); });
    } else {
      document.getElementById('revAgainBtn').addEventListener('click', () => { view={name:'review'}; render(); });
      document.getElementById('revDoneBtn').addEventListener('click', () => { view={name:'syllabus'}; render(); });
    }
  }
  draw();
}

/* ============ SYLLABUS ============ */

function renderSyllabus(main){
  let html = `<div class="page-title">Silabusas</div><div class="page-sub">Visas kurso planas. Kiekvienas modulis atrakinamas užbaigus ankstesnį.</div>`;

      barHtml = `<div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%"></div></div><span>${topicsDone}/${topics.length} temų</span>`;

/* ============ MODULE VIEW (topic list) ============ */

function renderModule(main){
  const moduleId = view.moduleId;
  const m = PLANNED_MODULES.find(x => x.id === moduleId);
  const content = MODULE_CONTENT[moduleId];
  const p = progress[moduleId];
  let html = `<div class="back-link" id="backBtn">← Silabusas</div>
    <div class="page-title">${m.icon} ${m.title}</div>
    <div class="page-sub">${m.subtitle}</div>
    <div class="stipendija-breakdown">💰 Temų vidurkis: <b>${Math.round(topicsAvg(moduleId))}%</b> (60%) · Atvejo analizių vidurkis: <b>${Math.round(caseStudiesAvg(moduleId))}%</b> (40%) · Stipendija: <b>${fmt(moduleStipendija(moduleId))}</b></div>
    <div class="topic-list">`;

  content.topics.forEach((t,i) => {
    const tp = p.topics[t.id];
    const icon = tp.bestScore !== null ? '✅' : (tp.theoryRead ? '📖' : '⚪');
    const scoreTxt = tp.bestScore !== null ? `<span class="topic-score">${tp.bestScore}%</span>` : '';
    html += `<div class="topic-row" data-tid="${t.id}">
      <span class="topic-num">${i+1}.</span>
      <span class="topic-status-icon">${icon}</span>
      <span class="t-title">${t.title}</span>
      ${scoreTxt}
    </div>`;
  });

  const allDone = allTopicsDone(moduleId);
  content.caseStudies.forEach((cs, idx) => {
    const csProg = p.caseStudies[idx];
    const prevDone = idx === 0 ? allDone : p.caseStudies[idx-1].done;
    const icon = csProg.done ? '✅' : '⚪';
    html += `<div class="topic-row capstone-row ${prevDone?'':'disabled'}" data-case="${idx}">
      <span class="topic-num">📌</span><span class="topic-status-icon">${icon}</span>
      <span class="t-title"><b>${cs.title}</b></span>
      ${csProg.done ? `<span class="topic-score">${csProg.score}%</span>` : ''}
    </div>`;
  });

  const practiceUnlocked = allDone && allCaseStudiesDone(moduleId);
  const practIcon = p.practice.done ? '✅' : '⚪';
  html += `<div class="topic-row practice-row ${practiceUnlocked?'':'disabled'}" id="practiceRow">
    <span class="topic-num">🎯</span><span class="topic-status-icon">${practIcon}</span>
    <span class="t-title"><b>${content.practice.label}</b> (kapitalas: ${fmt(moduleStipendija(moduleId))})</span>
  </div>`;

  html += `</div>`;
  main.innerHTML = html;

  document.getElementById('backBtn').addEventListener('click', () => { view={name:'syllabus'}; render(); });
  main.querySelectorAll('.topic-row[data-tid]').forEach(row => {
    row.addEventListener('click', () => { view = {name:'topic', moduleId, topicId:row.dataset.tid}; render(); });
  });
  main.querySelectorAll('.capstone-row[data-case]').forEach(row => {
    const idx = parseInt(row.dataset.case);
    row.addEventListener('click', () => {
      const prevDone = idx === 0 ? allTopicsDone(moduleId) : p.caseStudies[idx-1].done;
      if(!prevDone) return;
      view = {name:'casestudy', moduleId, caseIndex:idx}; render();
    });
  });
  const practRow = document.getElementById('practiceRow');
  if(practiceUnlocked) practRow.addEventListener('click', () => { view = {name:'practice', moduleId}; render(); });
}

/* ============ TOPIC: THEORY + QUIZ ============ */

function renderTopic(main){
  const moduleId = view.moduleId;
  const content = MODULE_CONTENT[moduleId];
  const t = content.topics.find(x => x.id === view.topicId);
  const tp = progress[moduleId].topics[t.id];
  let stage = tp.theoryRead ? 'quiz' : 'theory';

  function drawTheory(){
    const totalChars = t.theory.reduce((s,sec) => s + sec.p.length, 0) + (t.visual ? t.visual.intro.length : 0);
    const requiredSec = 3; /* TODO-LAIKINA: sumažinta testavimui, grąžinti į Math.min(90, Math.max(20, Math.round(totalChars / 9))) prieš paleidžiant realiems vartotojams */
    let elapsed = 0;

    let html = `<div class="back-link" id="backBtn">← Atgal į modulį</div><div class="content-panel">
      <h2 style="font-size:19px;margin-bottom:16px;">${t.title}</h2>`;
    t.theory.forEach(sec => { html += `<div class="theory-section"><h3>${sec.h}</h3><p>${sec.p}</p></div>`; });
    if(t.visual){
      html += `<div class="visual-example"><p class="ve-intro">${t.visual.intro}</p>${t.visual.html}</div>`;
    }
    if(t.optional){
      html += `<details class="optional-box"><summary>💡 ${t.optional.h} (neprivaloma)</summary><p>${t.optional.p}</p></details>`;
    }
    html += `<div class="timer-wrap">
        <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
        <div class="timer-label" id="timerLabel">Skaitykite ramiai... liko ${requiredSec}s</div>
      </div>
      <button class="continue-btn" id="theoryContinueBtn" disabled>Tęsti į testą →</button>
    </div>`;
    main.innerHTML = html;
    document.getElementById('backBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });

    timerInterval = setInterval(() => {
      elapsed++;
      const pct = Math.min(100, Math.round((elapsed/requiredSec)*100));
      const fillEl = document.getElementById('timerFill');
      const labelEl = document.getElementById('timerLabel');
      if(fillEl) fillEl.style.width = pct + '%';
      if(elapsed >= requiredSec){
        clearInterval(timerInterval);
        if(labelEl) labelEl.textContent = 'Perskaityta ✓ Galite tęsti.';
        const btn = document.getElementById('theoryContinueBtn');
        if(btn) btn.disabled = false;
      } else if(labelEl){
        labelEl.textContent = `Skaitykite ramiai... liko ${requiredSec-elapsed}s`;
      }
    }, 1000);

    document.getElementById('theoryContinueBtn').addEventListener('click', () => {
      tp.theoryRead = true;
      saveProgress();
      clearInterval(timerInterval);
      stage = 'quiz';
      drawQuiz();
    });
  }

  function drawQuiz(){
    let quizSet, selections, submitted;

    function startAttempt(){
      quizSet = sampleQuestions(t.quiz, meta.mode || 'learn');
      selections = quizSet.map(q => q.multi ? [] : null);
      submitted = false;
      draw();
    }

    function draw(){
      let html = `<div class="back-link" id="backBtn2">← Atgal į modulį</div><div class="content-panel">
        <h2 style="font-size:19px;margin-bottom:16px;">${t.title} — testas</h2>`;
      quizSet.forEach((q, qi) => {
        const diffLabel = q.diff === 'lengvas' ? '🟢 lengvas' : (q.diff === 'sunkus' ? '🔴 sunkus' : '🟡 vidutinis');
        const multiHint = q.multi ? ' <span style="color:var(--gold);">— pasirinkite VISUS tinkamus atsakymus</span>' : '';
        html += `<div class="quiz-q"><p class="qtext">${qi+1}. ${q.q}${multiHint} <span style="font-size:10.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;">(${diffLabel})</span></p>`;
        q.opts.forEach((opt, oi) => {
          let cls = 'qopt';
          const isSelected = q.multi ? selections[qi].includes(oi) : selections[qi] === oi;
          if(isSelected) cls += ' selected';
          if(submitted){
            const isCorrect = q.multi ? q.correct.includes(oi) : oi === q.correct;
            if(isCorrect) cls += ' correct';
            else if(isSelected) cls += ' incorrect';
          }
          const mark = q.multi ? (isSelected ? '☑ ' : '☐ ') : '';
          html += `<button class="${cls}" data-qi="${qi}" data-oi="${oi}" ${submitted?'disabled':''}>${mark}${opt}</button>`;
        });
        if(submitted) html += `<div class="explain">${q.ex}</div>`;
        html += `</div>`;
      });
      if(!submitted){
        const allAnswered = selections.every((s,i) => quizSet[i].multi ? s.length > 0 : s !== null);
        html += `<button class="submit-btn" id="quizSubmitBtn" ${allAnswered?'':'disabled'}>Pateikti atsakymus</button>`;
      } else {
        const correctCount = selections.filter((s,i) => quizSet[i].multi ? arraysEqual(s, quizSet[i].correct) : s === quizSet[i].correct).length;
        const scorePct = Math.round((correctCount/quizSet.length)*100);
        const passThreshold = PASS_THRESHOLD[meta.mode || 'learn'];
        const passed = (correctCount/quizSet.length) >= passThreshold;
        tp.attempts++;
        if(passed && (tp.bestScore === null || scorePct > tp.bestScore)) tp.bestScore = scorePct;
        saveProgress();
        html += `<div class="quiz-result">
          <div style="color:var(--muted);font-size:13px;">Rezultatas</div>
          <div class="score" style="color:${passed?'var(--gain)':'var(--loss)'}">${correctCount}/${quizSet.length} (${scorePct}%)</div>
          <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">${passed ? 'Tema įskaityta! Geriausias rezultatas: '+tp.bestScore+'%' : 'Reikia bent '+Math.round(passThreshold*100)+'%. Pabandykite dar kartą — klausimai bus kitokie.'}</div>
          <button class="submit-btn" id="retryBtn">Bandyti dar kartą</button>
          <button class="continue-btn" id="doneBtn" style="margin-left:8px;">Grįžti į modulį</button>
        </div>`;
      }
      html += `</div>`;
      main.innerHTML = html;
      document.getElementById('backBtn2').addEventListener('click', () => { view={name:'module', moduleId}; render(); });

      if(!submitted){
        main.querySelectorAll('.qopt').forEach(btn => {
          btn.addEventListener('click', () => {
            const qi = parseInt(btn.dataset.qi), oi = parseInt(btn.dataset.oi);
            if(quizSet[qi].multi){
              const idx = selections[qi].indexOf(oi);
              if(idx === -1) selections[qi].push(oi); else selections[qi].splice(idx,1);
            } else {
              selections[qi] = oi;
            }
            draw();
          });
        });
        const sb = document.getElementById('quizSubmitBtn');
        if(sb) sb.addEventListener('click', () => { submitted = true; draw(); });
      } else {
        document.getElementById('retryBtn').addEventListener('click', () => { startAttempt(); });
        document.getElementById('doneBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });
      }
    }
    startAttempt();
  }

  if(stage === 'theory') drawTheory(); else drawQuiz();
}

/* ============ CASE STUDY ============ */

function renderCaseStudy(main){
  const moduleId = view.moduleId;
  const idx = view.caseIndex;
  const cs = MODULE_CONTENT[moduleId].caseStudies[idx];
  let selections = new Array(cs.questions.length).fill(null);
  let submitted = false;

  function draw(){
    let html = `<div class="back-link" id="backBtn">← Atgal į modulį</div><div class="page-title">📌 ${cs.title}</div>
      <div class="content-panel"><p style="font-size:14px;line-height:1.7;color:var(--ink-soft);margin-bottom:18px;">${cs.scenario}</p>`;
    cs.questions.forEach((q, qi) => {
      html += `<div class="quiz-q"><p class="qtext">${qi+1}. ${q.q}</p>`;
      q.opts.forEach((opt, oi) => {
        let cls = 'qopt';
        if(selections[qi] === oi) cls += ' selected';
        if(submitted){
          if(oi === q.correct) cls += ' correct';
          else if(selections[qi] === oi) cls += ' incorrect';
        }
        html += `<button class="${cls}" data-qi="${qi}" data-oi="${oi}" ${submitted?'disabled':''}>${opt}</button>`;
      });
      if(submitted) html += `<div class="explain">${q.ex}</div>`;
      html += `</div>`;
    });
    if(!submitted){
      const allAnswered = selections.every(s => s!==null);
      html += `<button class="submit-btn" id="csSubmitBtn" ${allAnswered?'':'disabled'}>Pateikti</button>`;
    } else {
      const correctCount = selections.filter((s,i)=>s===cs.questions[i].correct).length;
      const scorePct = Math.round((correctCount/cs.questions.length)*100);
      progress[moduleId].caseStudies[idx] = {done:true, score: Math.max(scorePct, progress[moduleId].caseStudies[idx].score||0)};
      saveProgress();
      html += `<div class="quiz-result">
        <div class="score" style="color:${scorePct>=70?'var(--gain)':'var(--loss)'}">${correctCount}/${cs.questions.length} (${scorePct}%)</div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">Atvejo analizė įskaityta. Stipendija atnaujinta pagal geriausią rezultatą.</div>
        <button class="continue-btn" id="doneBtn">Grįžti į modulį</button>
      </div>`;
    }
    html += `</div>`;
    main.innerHTML = html;
    document.getElementById('backBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });
    if(!submitted){
      main.querySelectorAll('.qopt').forEach(btn => {
        btn.addEventListener('click', () => { selections[parseInt(btn.dataset.qi)]=parseInt(btn.dataset.oi); draw(); });
      });
      const sb = document.getElementById('csSubmitBtn');
      if(sb) sb.addEventListener('click', () => { submitted=true; draw(); });
    } else {
      document.getElementById('doneBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });
    }
  }
  draw();
}

/* ============ PRACTICE (dispatches by type) ============ */

function renderPractice(main){
  const moduleId = view.moduleId;
  const practice = MODULE_CONTENT[moduleId].practice;
  if(practice.type === 'news') renderPracticeNews(main, moduleId, practice);
  else if(practice.type === 'allocation') renderPracticeAllocation(main, moduleId, practice);
  else if(practice.type === 'statement') renderPracticeStatement(main, moduleId, practice);
  else if(practice.type === 'quizlike') renderPracticeQuizlike(main, moduleId, practice);
