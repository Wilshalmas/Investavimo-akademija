<style>
  :root{
    --bg:#0B0F14; --bg-panel:#121821; --bg-card:#161D28; --ink:#EDEAE0; --muted:#8B93A1;
    --gain:#3FA796; --loss:#C1553B; --gold:#D9A441; --border:#232B36; --locked:#2b3038;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;}
  #app{max-width:980px;margin:0 auto;padding:0 20px 60px;}
  h1,h2,h3{font-family:'Fraunces',serif;margin:0;}
  .hidden{display:none !important;}
  a{color:var(--gold);}

  header.top{padding:22px 0 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;position:sticky;top:0;background:var(--bg);z-index:10;}
  header.top h1{font-size:22px;font-weight:700;letter-spacing:.4px;cursor:pointer;}
  header.top h1 span{color:var(--gold);}
  .nav-right{display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);}
  .nav-link{cursor:pointer;padding:6px 10px;border-radius:5px;}
  .nav-link:hover{color:var(--ink);background:var(--bg-card);}
  .stipendija-chip{background:var(--bg-card);border:1px solid var(--gold);color:var(--gold);padding:5px 12px;border-radius:20px;font-weight:700;}
  .sync-status{cursor:default;font-size:14px;}

  .page-title{font-size:24px;margin:22px 0 4px;}
  .page-sub{color:var(--muted);font-size:13px;margin-bottom:20px;}

  .module-row{display:flex;gap:16px;align-items:flex-start;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:12px;cursor:pointer;transition:border-color .15s;}
  .module-row:hover{border-color:var(--gold);}
  .module-row.locked{opacity:.5;cursor:not-allowed;}
  .module-row.locked:hover{border-color:var(--border);}
  .module-badge-icon{font-size:28px;width:44px;text-align:center;flex-shrink:0;}
  .module-row h3{font-size:16.5px;margin-bottom:3px;}
  .module-row p{font-size:12.5px;color:var(--muted);margin:0 0 8px;}
  .module-meta{display:flex;gap:10px;align-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;}
  .tag{padding:3px 9px;border-radius:20px;}
  .tag-open{background:rgba(217,164,65,0.15);color:var(--gold);}
  .tag-done{background:rgba(63,167,150,0.15);color:var(--gain);}
  .tag-locked{background:var(--locked);color:var(--muted);}
  .mini-bar-track{width:100px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
  .mini-bar-fill{height:100%;background:var(--gold);}

  .back-link{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);cursor:pointer;display:inline-block;margin:18px 0 10px;}
  .back-link:hover{color:var(--gold);}
  .topic-list{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
  .topic-row{display:flex;align-items:center;gap:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:12px 16px;cursor:pointer;}
  .topic-row:hover{border-color:var(--gold);}
  .topic-row.disabled{opacity:.4;cursor:not-allowed;}
  .topic-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);width:22px;}
  .topic-row .t-title{flex:1;font-size:14px;}
  .topic-score{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gain);}
  .topic-status-icon{font-size:15px;}
  .capstone-row{border-color:var(--gold);}
  .practice-row{border-style:dashed;}

  .content-panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;padding:24px 26px;margin-top:14px;}
  .theory-section{margin-bottom:18px;}
  .theory-section h3{font-size:15.5px;color:var(--gold);margin-bottom:8px;}
  .theory-section p{font-size:14px;line-height:1.7;color:#D8D5C9;}
  .optional-box{margin-top:16px;border:1px dashed var(--border);border-radius:6px;padding:12px 14px;}
  .optional-box summary{cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--gold);}
  .optional-box p{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.6;}
  .timer-wrap{margin-top:18px;}
  .timer-track{width:100%;height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:8px;}
  .timer-fill{height:100%;background:var(--gold);width:0%;transition:width 1s linear;}
  .timer-label{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted);}
  .continue-btn{margin-top:14px;background:var(--gold);color:#161207;border:none;padding:10px 20px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12.5px;cursor:pointer;}
  .continue-btn:disabled{background:#3a3a3a;color:#888;cursor:not-allowed;}

  .quiz-q{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
  .quiz-q:last-of-type{border-bottom:none;}
  .quiz-q p.qtext{font-size:14px;font-weight:600;margin-bottom:9px;}
  .qopt{display:block;width:100%;text-align:left;background:var(--bg-card);border:1px solid var(--border);color:var(--ink);padding:9px 13px;border-radius:5px;font-size:13px;margin-bottom:7px;cursor:pointer;}
  .qopt:hover{border-color:var(--gold);}
  .qopt.selected{border-color:var(--gold);background:#1b2029;}
  .qopt.correct{border-color:var(--gain);background:rgba(63,167,150,0.12);}
  .qopt.incorrect{border-color:var(--loss);background:rgba(193,85,59,0.12);}
  .qopt:disabled{cursor:default;}
  .explain{font-size:12px;color:var(--muted);margin-top:5px;}
  .submit-btn{background:var(--gold);color:#161207;border:none;padding:10px 20px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12.5px;cursor:pointer;}
  .submit-btn:disabled{background:#3a3a3a;color:#888;cursor:not-allowed;}
  .quiz-result{text-align:center;padding:16px;}
  .quiz-result .score{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;margin:8px 0;}

  table.transcript{width:100%;border-collapse:collapse;font-size:13px;}
  table.transcript th, table.transcript td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);}
  table.transcript th{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;}
  .score-cell{font-family:'JetBrains Mono',monospace;}
  .badge-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
  .badge-chip{display:flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--gold);border-radius:20px;padding:6px 12px;font-size:12px;}

  .practice-item{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:12px;}
  .practice-item p.headline{font-size:14px;margin:0 0 10px;}
  .choice-row{display:flex;gap:10px;}
  .choice-btn{flex:1;padding:9px;border-radius:5px;border:1px solid var(--border);background:var(--bg-panel);color:var(--ink);font-family:'JetBrains Mono',monospace;font-size:12.5px;cursor:pointer;}
  .choice-btn:hover{border-color:var(--gold);}
  .choice-btn.right{border-color:var(--gain);background:rgba(63,167,150,0.15);}
  .choice-btn.wrong{border-color:var(--loss);background:rgba(193,85,59,0.15);}
  .choice-btn:disabled{cursor:default;}
  .feedback-box{margin-top:16px;padding:14px 16px;border-radius:6px;border-left:3px solid var(--gold);background:var(--bg-card);font-size:13.5px;line-height:1.6;color:#D8D5C9;}

  .certificate{text-align:center;padding:40px 20px;position:relative;overflow:hidden;}
  .certificate h2{font-size:28px;color:var(--gold);margin-bottom:8px;}
  .cert-box{border:2px solid var(--gold);border-radius:10px;padding:34px 26px;max-width:560px;margin:20px auto;background:var(--bg-card);}
  .cert-box .cname{font-family:'Fraunces',serif;font-size:26px;margin:14px 0;color:var(--ink);}
  .confetti{position:absolute;top:-10px;width:8px;height:8px;opacity:0.9;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(500px) rotate(360deg);opacity:0;}}
</style>
</head>

<!-- ============ FIREBASE (progreso saugojimui debesyje) ============ -->
<!-- Jei nenorite naudoti Firebase, tiesiog palikite firebaseConfig tuščią (null) -->
<!-- žemiau — programėlė automatiškai naudos tik šio įrenginio atmintį (localStorage). -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* ==========================================================================
   FIREBASE KONFIGŪRACIJA
   1. Eikite į https://console.firebase.google.com ir susikurkite nemokamą projektą
   2. Project settings (⚙️) → General → "Your apps" → pridėkite Web app (</>) 
   3. Nukopijuokite jums parodytą firebaseConfig objektą ir įklijuokite vietoj žemiau esančio
   4. Firestore Database skiltyje spauskite "Create database" (pasirinkite bet kurį regioną)
   5. Authentication skiltyje → Sign-in method → įjunkite "Anonymous"
   6. Firestore → Rules skiltyje įklijuokite taisykles iš pridėto README.md failo
   ========================================================================== */
const firebaseConfig = null; /* <-- ĮKLIJUOKITE SAVO firebaseConfig OBJEKTĄ ČIA, pvz.:
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "jusu-projektas.firebaseapp.com",
  projectId: "jusu-projektas",
  storageBucket: "jusu-projektas.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abcdef123456"
};
*/

let fbEnabled = false;
let fbUser = null;
let fbDb = null;

function setSyncStatus(state){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  if(state === 'offline') { el.textContent = '📴'; el.title = 'Offline — duomenys saugomi tik šiame įrenginyje'; }
  else if(state === 'syncing') { el.textContent = '🔄'; el.title = 'Sinchronizuojama...'; }
  else if(state === 'synced') { el.textContent = '☁️'; el.title = 'Progresas sinchronizuotas debesyje'; }
  else if(state === 'local') { el.textContent = '💾'; el.title = 'Saugoma tik šiame įrenginyje (Firebase neįjungtas)'; }
}

async function initFirebase(){
  if(!firebaseConfig){ setSyncStatus('local'); return; }
  try{
    firebase.initializeApp(firebaseConfig);
    fbDb = firebase.firestore();
    await firebase.auth().signInAnonymously();
    firebase.auth().onAuthStateChanged(user => { fbUser = user; });
    await new Promise(resolve => {
      const unsub = firebase.auth().onAuthStateChanged(user => { if(user){ fbUser = user; unsub(); resolve(); } });
    });
    fbEnabled = true;
    setSyncStatus('synced');
  }catch(e){
    console.error('Firebase init failed, falling back to local storage only:', e);
    fbEnabled = false;
    setSyncStatus('offline');
  }
}
</script>

/* ============ MODULE 1 CONTENT ============ */

{id:'t1', title:'Kas yra akcija?', theory:[

], quiz:[

  {q:'Kuri iš šių yra akcininko teisė?', opts:['Garantuotas fiksuotas mokėjimas kas mėnesį','Teisė valdyti įmonės kasdienę veiklą vienam asmeniui','Balsavimo teisė svarbiuose įmonės sprendimuose','Teisė reikalauti pinigų grąžinimo bet kada'], correct:2, ex:'Akcininkai dažniausiai turi balsavimo teisę, proporcingą jų turimų akcijų kiekiui.'}
]},
{id:'t2', title:'Kas yra obligacija?', theory:[
  {h:'Paskola, ne nuosavybė', p:'Pirkdami obligaciją, jūs iš esmės paskolinate pinigus įmonei ar valstybei. Jūs tampate kreditoriumi, o ne savininku, ir turite teisę atgauti pinigus su sutartomis palūkanomis.'},

  {h:'Obligacijos vs akcijos', p:'Obligacijos paprastai laikomos stabilesnėmis ir mažiau rizikingomis nei akcijos, tačiau jų potenciali grąža taip pat mažesnė.'}
], quiz:[

  {q:'Kas yra obligacijos „kuponas“?', opts:['Nuolaidos kodas obligacijai pirkti','Nustatyta palūkanų norma, mokama investuotojui','Obligacijos pardavimo mokestis','Akcijos kainos pokytis'], correct:1, ex:'Kuponas — tai palūkanų norma, kurią emitentas moka obligacijos savininkui.'},
  {q:'Palyginus su akcijomis, obligacijos paprastai yra...', opts:['Rizikingesnės, bet su didesne potencialia grąža','Stabilesnės, su mažesne potencialia grąža','Visiškai be jokios rizikos','Neįmanoma palyginti'], correct:1, ex:'Obligacijos dažniausiai laikomos stabilesnėmis, tačiau ir jų grąžos potencialas mažesnis.'}

const MODULE_CONTENT = {

};

/* ============ STATE ============ */

let progress = {};
BUILT_CHAIN.forEach(id => {
  progress[id] = { topics:{}, caseStudy:{done:false,score:0}, practice:{done:false} };
  MODULE_CONTENT[id].topics.forEach(t => progress[id].topics[t.id] = {theoryRead:false, bestScore:null, attempts:0});
});

let view = {name:'syllabus', moduleId:null, topicId:null};
let timerInterval = null;

async function saveProgress(){
  try{ localStorage.setItem('academy_progress_v2', JSON.stringify(progress)); }catch(e){}
  if(fbEnabled && fbDb && fbUser){
    setSyncStatus('syncing');
    try{
      await fbDb.collection('academy_progress').doc(fbUser.uid).set(progress);
      setSyncStatus('synced');
    }catch(e){
      console.error('Firebase save failed, progress stays saved locally:', e);
      setSyncStatus('offline');
    }
  }
}
async function loadProgress(){
  try{
    const local = localStorage.getItem('academy_progress_v2');
    if(local) applySavedProgress(JSON.parse(local));
  }catch(e){}
  if(fbEnabled && fbDb && fbUser){
    try{
      const doc = await fbDb.collection('academy_progress').doc(fbUser.uid).get();
      if(doc.exists){
        applySavedProgress(doc.data());
        localStorage.setItem('academy_progress_v2', JSON.stringify(progress));
      }
      setSyncStatus('synced');
    }catch(e){
      console.error('Firebase load failed, using local data:', e);
      setSyncStatus('offline');
    }
  }
}
function applySavedProgress(saved){
  if(!saved) return;
  BUILT_CHAIN.forEach(id => {
    if(saved[id]){
      Object.keys(progress[id].topics).forEach(k => { if(saved[id].topics && saved[id].topics[k]) progress[id].topics[k] = saved[id].topics[k]; });
      if(saved[id].caseStudy) progress[id].caseStudy = saved[id].caseStudy;
      if(saved[id].practice) progress[id].practice = saved[id].practice;
    }
  });
}

function fmt(n){ return '€' + n.toLocaleString('lt-LT',{maximumFractionDigits:0}); }

function topicsAvg(moduleId){
  const topics = MODULE_CONTENT[moduleId].topics;
  const scores = topics.map(t => progress[moduleId].topics[t.id].bestScore).filter(s => s !== null);
  if(scores.length === 0) return 0;
  return scores.reduce((a,b)=>a+b,0) / scores.length;
}
function allTopicsDone(moduleId){
  return MODULE_CONTENT[moduleId].topics.every(t => progress[moduleId].topics[t.id].bestScore !== null);
}
function moduleStipendija(moduleId){
  const avg = topicsAvg(moduleId);
  const caseScore = progress[moduleId].caseStudy.score || 0;
  const combined = progress[moduleId].caseStudy.done ? (avg*0.7 + caseScore*0.3) : avg;
  return Math.round(5000 + (combined/100)*5000);
}
function moduleFullyDone(moduleId){
  return allTopicsDone(moduleId) && progress[moduleId].caseStudy.done && progress[moduleId].practice.done;
}
function isModuleUnlocked(moduleId){
  const idx = BUILT_CHAIN.indexOf(moduleId);
  if(idx <= 0) return true;
  return moduleFullyDone(BUILT_CHAIN[idx-1]);
}
function overallStipendija(){
  const doneVals = BUILT_CHAIN.filter(id => moduleFullyDone(id)).map(id => moduleStipendija(id));
  if(doneVals.length) return Math.round(doneVals.reduce((a,b)=>a+b,0)/doneVals.length);
  const activeId = BUILT_CHAIN.find(id => isModuleUnlocked(id) && !moduleFullyDone(id));
  if(activeId) return Math.round(5000 + (topicsAvg(activeId)/100)*5000*0.5);
  return 5000;
}

function renderHeader(){
  document.getElementById('stipChip').textContent = fmt(overallStipendija()) + ' stipendija';
}

document.getElementById('homeLink').addEventListener('click', () => { view = {name:'syllabus'}; render(); });
document.getElementById('navTranscript').addEventListener('click', () => { view = {name:'transcript'}; render(); });

function render(){
  clearInterval(timerInterval);
  renderHeader();
  const main = document.getElementById('main');
  if(view.name === 'syllabus') renderSyllabus(main);
  else if(view.name === 'module') renderModule(main);
  else if(view.name === 'topic') renderTopic(main);
  else if(view.name === 'casestudy') renderCaseStudy(main);
  else if(view.name === 'practice') renderPractice(main);
  else if(view.name === 'transcript') renderTranscript(main);
  else if(view.name === 'certificate') renderCertificate(main);
}

/* ============ SYLLABUS ============ */

function renderSyllabus(main){
  let html = `<div class="page-title">Silabusas</div><div class="page-sub">Visas kurso planas. Kiekvienas modulis atrakinamas užbaigus ankstesnį.</div>`;
  PLANNED_MODULES.forEach((m, mIdx) => {
    let statusHtml, barHtml = '';
    if(m.built){
      const unlocked = isModuleUnlocked(m.id);
      const done = moduleFullyDone(m.id);
      const topics = MODULE_CONTENT[m.id].topics;
      const topicsDone = topics.filter(t => progress[m.id].topics[t.id].bestScore !== null).length;
      const pct = Math.round((topicsDone / topics.length) * 100);
      statusHtml = done ? '<span class="tag tag-done">✓ Baigta</span>' : (unlocked ? '<span class="tag tag-open">Galima pradėti</span>' : '<span class="tag tag-locked">🔒 Užrakinta</span>');
      barHtml = `<div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%"></div></div><span>${topicsDone}/${topics.length} temų</span>`;
    } else {
      statusHtml = '<span class="tag tag-locked">🔧 Ruošiama</span>';
    }
    html += `<div class="module-row ${m.built && isModuleUnlocked(m.id) ? '' : 'locked'}" data-id="${m.id}">
      <div class="module-badge-icon">${m.icon}</div>
      <div style="flex:1">
        <h3>${mIdx+1}. ${m.title}</h3>
        <p>${m.subtitle}</p>
        <div class="module-meta">${statusHtml}${barHtml}</div>
      </div>
    </div>`;
  });
  main.innerHTML = html;
  main.querySelectorAll('.module-row:not(.locked)').forEach(row => {
    row.addEventListener('click', () => {
      const id = row.dataset.id;
      if(!MODULE_CONTENT[id]) return;
      view = {name:'module', moduleId:id}; render();
    });
  });
}

/* ============ MODULE VIEW (topic list) ============ */

function renderModule(main){
  const m = PLANNED_MODULES.find(x => x.id === view.moduleId);
  const content = MODULE_CONTENT[view.moduleId];
  const p = progress[view.moduleId];
  let html = `<div class="back-link" id="backBtn">← Silabusas</div>
    <div class="page-title">${m.icon} ${m.title}</div>
    <div class="page-sub">${m.subtitle}</div>
    <div class="topic-list">`;

  content.topics.forEach((t,i) => {
    const tp = p.topics[t.id];
    const icon = tp.bestScore !== null ? '✅' : (tp.theoryRead ? '📖' : '⚪');
    const scoreTxt = tp.bestScore !== null ? `<span class="topic-score">${tp.bestScore}%</span>` : '';
    html += `<div class="topic-row" data-tid="${t.id}">
      <span class="topic-num">${i+1}.</span>
      <span class="topic-status-icon">${icon}</span>
      <span class="t-title">${t.title}</span>
      ${scoreTxt}
    </div>`;
  });

  const allDone = allTopicsDone(view.moduleId);
  const caseIcon = p.caseStudy.done ? '✅' : '⚪';
  html += `<div class="topic-row capstone-row ${allDone?'':'disabled'}" id="caseRow">
    <span class="topic-num">📌</span><span class="topic-status-icon">${caseIcon}</span>
    <span class="t-title"><b>Atvejo analizė</b> — kaupiamasis scenarijus</span>
    ${p.caseStudy.done ? `<span class="topic-score">${p.caseStudy.score}%</span>` : ''}
  </div>`;

  const practiceUnlocked = allDone && p.caseStudy.done;
  const practIcon = p.practice.done ? '✅' : '⚪';
  html += `<div class="topic-row practice-row ${practiceUnlocked?'':'disabled'}" id="practiceRow">
    <span class="topic-num">🎯</span><span class="topic-status-icon">${practIcon}</span>
    <span class="t-title"><b>${content.practice.label}</b> (kapitalas: ${fmt(moduleStipendija(view.moduleId))})</span>
  </div>`;

  html += `</div>`;
  main.innerHTML = html;

  document.getElementById('backBtn').addEventListener('click', () => { view={name:'syllabus'}; render(); });
  main.querySelectorAll('.topic-row[data-tid]').forEach(row => {
    row.addEventListener('click', () => { view = {name:'topic', moduleId:view.moduleId, topicId:row.dataset.tid}; render(); });
  });
  const caseRow = document.getElementById('caseRow');
  if(allDone) caseRow.addEventListener('click', () => { view = {name:'casestudy', moduleId:view.moduleId}; render(); });
  const practRow = document.getElementById('practiceRow');
  if(practiceUnlocked) practRow.addEventListener('click', () => { view = {name:'practice', moduleId:view.moduleId}; render(); });
}

/* ============ TOPIC: THEORY + QUIZ ============ */

function renderTopic(main){
  const moduleId = view.moduleId;
  const content = MODULE_CONTENT[moduleId];
  const t = content.topics.find(x => x.id === view.topicId);
  const tp = progress[moduleId].topics[t.id];
  let stage = tp.theoryRead ? 'quiz' : 'theory';

  function drawTheory(){
    const totalChars = t.theory.reduce((s,sec) => s + sec.p.length, 0);
    const requiredSec = Math.min(60, Math.max(25, Math.round(totalChars / 14)));
    let elapsed = 0;

    let html = `<div class="back-link" id="backBtn">← Atgal į modulį</div><div class="content-panel">`;
    t.theory.forEach(sec => { html += `<div class="theory-section"><h3>${sec.h}</h3><p>${sec.p}</p></div>`; });
    if(t.optional){
      html += `<details class="optional-box"><summary>💡 ${t.optional.h} (neprivaloma)</summary><p>${t.optional.p}</p></details>`;
    }
    html += `<div class="timer-wrap">
        <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
        <div class="timer-label" id="timerLabel">Skaitykite ramiai... liko ${requiredSec}s</div>
      </div>
      <button class="continue-btn" id="theoryContinueBtn" disabled>Tęsti į testą →</button>
    </div>`;
    main.innerHTML = html;
    document.getElementById('backBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });

    timerInterval = setInterval(() => {
      elapsed++;
      const pct = Math.min(100, Math.round((elapsed/requiredSec)*100));
      const fillEl = document.getElementById('timerFill');
      const labelEl = document.getElementById('timerLabel');
      if(fillEl) fillEl.style.width = pct + '%';
      if(elapsed >= requiredSec){
        clearInterval(timerInterval);
        if(labelEl) labelEl.textContent = 'Perskaityta ✓ Galite tęsti.';
        const btn = document.getElementById('theoryContinueBtn');
        if(btn) btn.disabled = false;
      } else if(labelEl){
        labelEl.textContent = `Skaitykite ramiai... liko ${requiredSec-elapsed}s`;
      }
    }, 1000);

    document.getElementById('theoryContinueBtn').addEventListener('click', () => {
      tp.theoryRead = true;
      saveProgress();
      clearInterval(timerInterval);
      stage = 'quiz';
      drawQuiz();
    });
  }

  function drawQuiz(){
    let selections = new Array(t.quiz.length).fill(null);
    let submitted = false;

    function draw(){
      let html = `<div class="back-link" id="backBtn2">← Atgal į modulį</div><div class="content-panel">`;
      t.quiz.forEach((q, qi) => {
        html += `<div class="quiz-q"><p class="qtext">${qi+1}. ${q.q}</p>`;
        q.opts.forEach((opt, oi) => {
          let cls = 'qopt';
          if(selections[qi] === oi) cls += ' selected';
          if(submitted){
            if(oi === q.correct) cls += ' correct';
            else if(selections[qi] === oi) cls += ' incorrect';
          }
          html += `<button class="${cls}" data-qi="${qi}" data-oi="${oi}" ${submitted?'disabled':''}>${opt}</button>`;
        });
        if(submitted) html += `<div class="explain">${q.ex}</div>`;
        html += `</div>`;
      });
      if(!submitted){
        const allAnswered = selections.every(s => s !== null);
        html += `<button class="submit-btn" id="quizSubmitBtn" ${allAnswered?'':'disabled'}>Pateikti atsakymus</button>`;
      } else {
        const correctCount = selections.filter((s,i) => s === t.quiz[i].correct).length;
        const scorePct = Math.round((correctCount/t.quiz.length)*100);
        tp.attempts++;
        if(tp.bestScore === null || scorePct > tp.bestScore) tp.bestScore = scorePct;
        saveProgress();
        html += `<div class="quiz-result">
          <div style="color:var(--muted);font-size:13px;">Rezultatas</div>
          <div class="score" style="color:${scorePct>=70?'var(--gain)':'var(--loss)'}">${correctCount}/${t.quiz.length} (${scorePct}%)</div>
          <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">Geriausias rezultatas šiai temai: ${tp.bestScore}%</div>
          <button class="submit-btn" id="retryBtn">Bandyti dar kartą</button>
          <button class="continue-btn" id="doneBtn" style="margin-left:8px;">Grįžti į modulį</button>
        </div>`;
      }
      html += `</div>`;
      main.innerHTML = html;
      document.getElementById('backBtn2').addEventListener('click', () => { view={name:'module', moduleId}; render(); });

      if(!submitted){
        main.querySelectorAll('.qopt').forEach(btn => {
          btn.addEventListener('click', () => { selections[parseInt(btn.dataset.qi)] = parseInt(btn.dataset.oi); draw(); });
        });
        const sb = document.getElementById('quizSubmitBtn');
        if(sb) sb.addEventListener('click', () => { submitted = true; draw(); });
      } else {
        document.getElementById('retryBtn').addEventListener('click', () => { selections = new Array(t.quiz.length).fill(null); submitted=false; draw(); });
        document.getElementById('doneBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });
      }
    }
    draw();
  }

  if(stage === 'theory') drawTheory(); else drawQuiz();
}

  const cs = MODULE_CONTENT[moduleId].caseStudy;

  function draw(){
    let html = `<div class="back-link" id="backBtn">← Atgal į modulį</div><div class="page-title">📌 ${cs.title}</div>
      <div class="content-panel"><p style="font-size:14px;line-height:1.7;color:#D8D5C9;margin-bottom:18px;">${cs.scenario}</p>`;
    cs.questions.forEach((q, qi) => {
      html += `<div class="quiz-q"><p class="qtext">${qi+1}. ${q.q}</p>`;
      q.opts.forEach((opt, oi) => {
        let cls = 'qopt';
        if(selections[qi] === oi) cls += ' selected';
        if(submitted){
          if(oi === q.correct) cls += ' correct';
          else if(selections[qi] === oi) cls += ' incorrect';
        }
        html += `<button class="${cls}" data-qi="${qi}" data-oi="${oi}" ${submitted?'disabled':''}>${opt}</button>`;
      });
      if(submitted) html += `<div class="explain">${q.ex}</div>`;
      html += `</div>`;
    });
    if(!submitted){
      const allAnswered = selections.every(s => s!==null);
      html += `<button class="submit-btn" id="csSubmitBtn" ${allAnswered?'':'disabled'}>Pateikti</button>`;
    } else {
      const correctCount = selections.filter((s,i)=>s===cs.questions[i].correct).length;
      const scorePct = Math.round((correctCount/cs.questions.length)*100);
      progress[moduleId].caseStudy = {done:true, score: Math.max(scorePct, progress[moduleId].caseStudy.score||0)};
      saveProgress();
      html += `<div class="quiz-result">
        <div class="score" style="color:${scorePct>=70?'var(--gain)':'var(--loss)'}">${correctCount}/${cs.questions.length} (${scorePct}%)</div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">Atvejo analizė įskaityta. Stipendija atnaujinta pagal geriausią rezultatą.</div>
        <button class="continue-btn" id="doneBtn">Grįžti į modulį</button>
      </div>`;
    }
    html += `</div>`;
    main.innerHTML = html;
    document.getElementById('backBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });
    if(!submitted){
      main.querySelectorAll('.qopt').forEach(btn => {
        btn.addEventListener('click', () => { selections[parseInt(btn.dataset.qi)]=parseInt(btn.dataset.oi); draw(); });
      });
      const sb = document.getElementById('csSubmitBtn');
      if(sb) sb.addEventListener('click', () => { submitted=true; draw(); });
    } else {
      document.getElementById('doneBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });
    }
  }
  draw();
}

/* ============ PRACTICE (dispatches by type) ============ */

function renderPractice(main){
  const moduleId = view.moduleId;
  const practice = MODULE_CONTENT[moduleId].practice;
  if(practice.type === 'news') renderPracticeNews(main, moduleId, practice);
  else if(practice.type === 'allocation') renderPracticeAllocation(main, moduleId, practice);
}

function renderPracticeNews(main, moduleId, practice){
  const capital = moduleStipendija(moduleId);
  let answers = new Array(practice.items.length).fill(null);
  function draw(){
    let html = `<div class="back-link" id="backBtn">← Atgal į modulį</div><div class="page-title">🎯 ${practice.label}</div>
      <div class="page-sub">Jūsų stipendija šiai praktikai: <b style="color:var(--gold)">${fmt(capital)}</b> (priklauso nuo testų rezultatų)</div>
      <div class="content-panel">
      <p style="color:var(--muted);font-size:13px;margin-bottom:16px;">Perskaitykite kiekvieną naujieną ir nuspėkite, kaip pasikeis akcijos kaina.</p>`;
    practice.items.forEach((n,i) => {
      html += `<div class="practice-item"><p class="headline">${n.text}</p>
        <div class="choice-row">
          <button class="choice-btn" data-i="${i}" data-v="up" ${answers[i]?'disabled':''}>📈 Kils</button>
          <button class="choice-btn" data-i="${i}" data-v="down" ${answers[i]?'disabled':''}>📉 Kris</button>
        </div>`;
      if(answers[i]){
        const correct = answers[i]===n.answer;
        html += `<div class="explain" style="margin-top:8px;color:${correct?'var(--gain)':'var(--loss)'}">${correct?'✓ Teisingai. ':'✗ Netiksliai. '}${n.why}</div>`;
      }
      html += `</div>`;
    });
    const allDone = answers.every(a=>a!==null);
    if(allDone){
      const correctCount = answers.filter((a,i)=>a===practice.items[i].answer).length;
      html += `<div class="feedback-box">Rezultatas: ${correctCount}/${practice.items.length} teisingai su ${fmt(capital)} virtualiu kapitalu.</div>
      <button class="continue-btn" id="finishBtn">Baigti modulį →</button>`;
    }
    html += `</div>`;
    main.innerHTML = html;
    document.getElementById('backBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });
    main.querySelectorAll('.choice-btn:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => { answers[parseInt(btn.dataset.i)] = btn.dataset.v; draw(); });
    });
    const fb = document.getElementById('finishBtn');
    if(fb) fb.addEventListener('click', () => {
      progress[moduleId].practice.done = true;
      saveProgress();
      view = {name:'certificate', moduleId};
      render();
    });
  }
  draw();
}

function renderPracticeAllocation(main, moduleId, practice){
  const capital = moduleStipendija(moduleId);
  const assets = practice.assets;
  function draw(){
    let html = `<div class="back-link" id="backBtn">← Atgal į modulį</div><div class="page-title">🎯 ${practice.label}</div>
      <div class="page-sub">Turimas kapitalas: <b style="color:var(--gold)">${fmt(capital)}</b> — paskirstykite procentais tarp 5 aktyvų.</div>
      <div class="content-panel">`;
    assets.forEach((a,i) => {
      html += `<div class="alloc-row"><div><div class="alloc-name">${a.name}</div><div class="alloc-risk">${a.risk}</div></div>
        <div><input type="number" min="0" max="100" class="alloc-input" id="alloc-${i}" value="0">%</div></div>`;
    });
    html += `<div class="alloc-total" id="allocTotal">Iš viso: 0%</div><button class="submit-btn" id="allocSubmitBtn">Pateikti</button><div id="allocFeedback"></div></div>`;
    main.innerHTML = html;
    document.getElementById('backBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });

    function updateTotal(){ let t=0; assets.forEach((a,i)=>t+=parseInt(document.getElementById('alloc-'+i).value)||0); document.getElementById('allocTotal').textContent='Iš viso: '+t+'%'; return t; }
    assets.forEach((a,i)=>document.getElementById('alloc-'+i).addEventListener('input', updateTotal));

    document.getElementById('allocSubmitBtn').addEventListener('click', () => {
      const total = updateTotal();
      if(total !== 100){ document.getElementById('allocFeedback').innerHTML = `<div class="feedback-box" style="border-color:var(--loss);">Procentai turi susumuoti lygiai į 100%. Šiuo metu: ${total}%.</div>`; return; }
      const allocs = assets.map((a,i)=>parseInt(document.getElementById('alloc-'+i).value)||0);
      const maxAlloc = Math.max(...allocs);
      const numUsed = allocs.filter(v=>v>0).length;
      const weightedVol = allocs.reduce((s,v,i)=>s+(v/100)*assets[i].vol,0);
      let verdict;
      if(maxAlloc>60) verdict = 'Portfelis stipriai sutelktas viename aktyve — tai padidina riziką prarasti didelę dalį, jei tas aktyvas nuvertėtų.';
      else if(numUsed<=2) verdict = 'Naudojate mažai skirtingų aktyvų — diversifikacija galėtų būti platesnė.';
      else if(maxAlloc<=40 && numUsed>=4) verdict = 'Gerai diversifikuotas portfelis — rizika paskirstyta tarp kelių skirtingo rizikos lygio aktyvų.';
      else verdict = 'Vidutiniškai diversifikuotas portfelis — neblogas balansas, bet galėtumėte paskirstyti dar tolygiau.';
      document.getElementById('allocFeedback').innerHTML = `<div class="feedback-box"><b>Įvertintas portfelio volatilumas:</b> ${(weightedVol*100).toFixed(1)}%<br><b>Didžiausia koncentracija viename aktyve:</b> ${maxAlloc}%<br><br>${verdict}</div>
        <button class="continue-btn" id="finishBtn">Baigti modulį →</button>`;
      document.getElementById('finishBtn').addEventListener('click', () => {
        progress[moduleId].practice.done = true;
        saveProgress();
        view = {name:'certificate', moduleId};
        render();
      });
    });
  }
  draw();
}

/* ============ TRANSCRIPT ============ */

function renderTranscript(main){
  let html = `<div class="page-title">Pažymių knygelė</div><div class="page-sub">Visi jūsų rezultatai vienoje vietoje.</div>
    <table class="transcript"><thead><tr><th>Modulis / Tema</th><th>Rezultatas</th></tr></thead><tbody>`;
  const badges = [];
  PLANNED_MODULES.forEach(m => {
    if(!m.built){
      html += `<tr><td colspan="2" style="color:var(--muted);font-weight:600;padding-top:14px;">${m.title} — ruošiama</td></tr>`;
      return;
    }
    html += `<tr><td colspan="2" style="color:var(--gold);font-weight:600;padding-top:14px;">${m.title}</td></tr>`;
    MODULE_CONTENT[m.id].topics.forEach(t => {
      const tp = progress[m.id].topics[t.id];
      html += `<tr><td>${t.title}</td><td class="score-cell">${tp.bestScore !== null ? tp.bestScore+'%' : '—'}</td></tr>`;
    });
    html += `<tr><td>Atvejo analizė</td><td class="score-cell">${progress[m.id].caseStudy.done ? progress[m.id].caseStudy.score+'%' : '—'}</td></tr>`;
    html += `<tr><td>Praktika</td><td class="score-cell">${progress[m.id].practice.done ? 'Baigta' : '—'}</td></tr>`;
    html += `<tr><td><b>Modulio vidurkis</b></td><td class="score-cell"><b>${Math.round(topicsAvg(m.id))}%</b></td></tr>`;
    if(moduleFullyDone(m.id)) badges.push({icon:'🏅', name:m.badgeName});
    if(topicsAvg(m.id) === 100 && allTopicsDone(m.id)) badges.push({icon:'🌟', name:'Tobulas mokinys („'+m.title+'“)'});
  });
  html += `</tbody></table>`;
  html += `<div class="badge-row">${badges.length ? badges.map(b=>`<div class="badge-chip">${b.icon} ${b.name}</div>`).join('') : '<span style="color:var(--muted);font-size:12.5px;">Kol kas ženklelių nėra — baikite modulį, kad juos gautumėte.</span>'}</div>`;
  main.innerHTML = html;
}

/* ============ CERTIFICATE ============ */

function renderCertificate(main){
  const moduleId = view.moduleId;
  const m = PLANNED_MODULES.find(x => x.id === moduleId);
  main.innerHTML = `
    <div class="certificate" id="certWrap">
      <h2>🎓 Sveikiname!</h2>
      <div class="cert-box">
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;">INVESTAVIMO AKADEMIJA</div>
        <div class="cname">${m.title}</div>
        <div style="color:var(--muted);font-size:13px;">Sėkmingai užbaigta su ${Math.round(topicsAvg(moduleId))}% vidutiniu rezultatu</div>
        <div style="margin-top:14px;font-size:12.5px;color:var(--gold);">${m.icon} Ženklelis: ${m.badgeName}</div>
      </div>
      <button class="continue-btn" id="backHomeBtn">Grįžti į silabusą</button>
    </div>`;
  document.getElementById('backHomeBtn').addEventListener('click', () => { view={name:'syllabus'}; render(); });

  const colors = ['#D9A441','#3FA796','#C1553B','#EDEAE0'];
  const wrap = document.getElementById('certWrap');
  for(let i=0;i<60;i++){
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random()*100 + '%';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (2 + Math.random()*2) + 's';
    el.style.animationDelay = (Math.random()*0.8) + 's';
    wrap.appendChild(el);
  }
}

(async function(){
  await initFirebase();
  await loadProgress();
  render();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.error('SW registracija nepavyko:', e));
  });
}
