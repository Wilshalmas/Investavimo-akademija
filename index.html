function renderPracticeNews(main, moduleId, practice){
  const capital = moduleStipendija(moduleId);
  const allItems = practice.data.items;
  const items = meta.mode === 'browse' ? allItems.slice(0,3) : allItems;
  let answers = new Array(items.length).fill(null);
  let bonusAnswer = null;
  const showBonus = meta.mode === 'learn' && practice.data.bonusMath;

  function draw(){
    let html = `<div class="back-link" id="backBtn">← Atgal į modulį</div><div class="page-title">🎯 ${practice.label}</div>
      <div class="page-sub">Jūsų stipendija šiai praktikai: <b style="color:var(--gold)">${fmt(capital)}</b> (priklauso nuo testų rezultatų)</div>
      <div class="content-panel">
      <p style="color:var(--muted);font-size:13px;margin-bottom:16px;">Perskaitykite kiekvieną naujieną ir nuspėkite, kaip pasikeis akcijos kaina.</p>`;
    items.forEach((n,i) => {
      html += `<div class="practice-item"><p class="headline">${n.text}</p>
        <div class="choice-row">
          <button class="choice-btn" data-i="${i}" data-v="up" ${answers[i]?'disabled':''}>📈 Kils</button>
          <button class="choice-btn" data-i="${i}" data-v="down" ${answers[i]?'disabled':''}>📉 Kris</button>
        </div>`;
      if(answers[i]){
        const correct = answers[i]===n.answer;
        html += `<div class="explain" style="margin-top:8px;color:${correct?'var(--gain)':'var(--loss)'}">${correct?'✓ Teisingai. ':'✗ Netiksliai. '}${n.why}</div>`;
      }
      html += `</div>`;
    });
    const allDone = answers.every(a=>a!==null);
    if(allDone && showBonus){
      const bm = practice.data.bonusMath;
      html += `<div class="practice-item" style="border-color:var(--gold);"><p class="headline">🧮 Papildomas mąstymo klausimas: ${bm.q}</p>
        <div class="choice-row" style="flex-wrap:wrap;">`;
      bm.opts.forEach((opt,oi) => {
        let cls = 'choice-btn';
        if(bonusAnswer!==null){ if(oi===bm.correct) cls+=' right'; else if(bonusAnswer===oi) cls+=' wrong'; }
        html += `<button class="${cls}" data-boi="${oi}" ${bonusAnswer!==null?'disabled':''} style="flex:0 0 45%;">${opt}</button>`;
      });
      html += `</div>`;
      if(bonusAnswer!==null) html += `<div class="explain" style="margin-top:8px;">${bm.ex}</div>`;
      html += `</div>`;
    }
    if(allDone && (!showBonus || bonusAnswer!==null)){
      const correctCount = answers.filter((a,i)=>a===items[i].answer).length;
      html += `<div class="feedback-box">Rezultatas: ${correctCount}/${items.length} teisingai su ${fmt(capital)} virtualiu kapitalu.</div>
      <button class="continue-btn" id="finishBtn">Baigti modulį →</button>`;
    }
    html += `</div>`;
    main.innerHTML = html;
    document.getElementById('backBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });
    main.querySelectorAll('.choice-btn[data-i]:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => { answers[parseInt(btn.dataset.i)] = btn.dataset.v; draw(); });
    });
    main.querySelectorAll('.choice-btn[data-boi]:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => { bonusAnswer = parseInt(btn.dataset.boi); draw(); });
    });
    const fb = document.getElementById('finishBtn');
    if(fb) fb.addEventListener('click', () => {
      progress[moduleId].practice.done = true;
      saveProgress();
      view = {name:'certificate', moduleId};
      render();
    });
  }
  draw();
}

function renderPracticeAllocation(main, moduleId, practice){
  const capital = moduleStipendija(moduleId);
  const assets = practice.assets;
  const persona = practice.persona;
  function draw(){
    let html = `<div class="back-link" id="backBtn">← Atgal į modulį</div><div class="page-title">🎯 ${practice.label}</div>
      <div class="content-panel">`;
    if(persona){
      html += `<div class="feedback-box" style="margin-top:0;margin-bottom:18px;"><b>${persona.name}:</b> ${persona.desc}</div>`;
    }
    html += `<p style="color:var(--muted);font-size:13px;margin-bottom:14px;">Turimas kapitalas: <b style="color:var(--gold)">${fmt(capital)}</b> — paskirstykite procentais tarp 5 aktyvų taip, kaip manote, geriausiai tiktų ${persona?persona.name:'šiam investuotojui'}.</p>`;
    assets.forEach((a,i) => {
      html += `<div class="alloc-row"><div><div class="alloc-name">${a.name}</div><div class="alloc-risk">${a.risk}</div></div>
        <div><input type="number" min="0" max="100" class="alloc-input" id="alloc-${i}" value="0">%</div></div>`;
    });
    html += `<div class="alloc-total" id="allocTotal">Iš viso: 0%</div><button class="submit-btn" id="allocSubmitBtn">Pateikti</button><div id="allocFeedback"></div></div>`;
    main.innerHTML = html;
    document.getElementById('backBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });

    function updateTotal(){ let t=0; assets.forEach((a,i)=>t+=parseInt(document.getElementById('alloc-'+i).value)||0); document.getElementById('allocTotal').textContent='Iš viso: '+t+'%'; return t; }
    assets.forEach((a,i)=>document.getElementById('alloc-'+i).addEventListener('input', updateTotal));

    document.getElementById('allocSubmitBtn').addEventListener('click', () => {
      const total = updateTotal();
      if(total !== 100){ document.getElementById('allocFeedback').innerHTML = `<div class="feedback-box" style="border-color:var(--loss);">Procentai turi susumuoti lygiai į 100%. Šiuo metu: ${total}%.</div>`; return; }
      const allocs = assets.map((a,i)=>parseInt(document.getElementById('alloc-'+i).value)||0);
      const maxAlloc = Math.max(...allocs);
      const numUsed = allocs.filter(v=>v>0).length;
      const weightedVol = allocs.reduce((s,v,i)=>s+(v/100)*assets[i].vol,0);
      const swingEuros = Math.round(capital * weightedVol);

      let verdict;
      if(persona){
        const diversified = numUsed>=3 && maxAlloc<=50;
        if(weightedVol <= persona.idealMaxVol && diversified) verdict = `Puikiai pritaikyta ${persona.name} profiliui — santūri rizika ir gera diversifikacija, tinka trumpam laiko horizontui.`;
        else if(weightedVol <= persona.idealMaxVol && !diversified) verdict = `Volatilumas priimtinas, bet portfelis per mažai diversifikuotas kelių aktyvų atžvilgiu — verta paskirstyti plačiau.`;
        else if(weightedVol <= persona.idealMaxVol*1.8) verdict = `Šiek tiek per rizikinga tokiam artimam pensijos horizontui — apsvarstykite daugiau saugesnių aktyvų (Saugus Bankas, Maisto Grandinė).`;
        else verdict = `Per daug rizikinga ${persona.name} situacijai — toks paskirstymas geriau tiktų jaunesniam investuotojui su ilgu laiko horizontu, ne artimam pensijai.`;
      } else if(maxAlloc>60) verdict = 'Portfelis stipriai sutelktas viename aktyve — tai padidina riziką prarasti didelę dalį, jei tas aktyvas nuvertėtų.';
      else if(numUsed<=2) verdict = 'Naudojate mažai skirtingų aktyvų — diversifikacija galėtų būti platesnė.';
      else if(maxAlloc<=40 && numUsed>=4) verdict = 'Gerai diversifikuotas portfelis — rizika paskirstyta tarp kelių skirtingo rizikos lygio aktyvų.';
      else verdict = 'Vidutiniškai diversifikuotas portfelis — neblogas balansas, bet galėtumėte paskirstyti dar tolygiau.';

      const closingNote = persona
        ? `<br><br><b>Paaiškinimas:</b> investuotojui, artimam pensijai (trumpas laiko horizontas), paprastai rekomenduojama didesnę portfelio dalį skirti mažo volatilumo aktyvams (pvz. Saugus Bankas, Maisto Grandinė), o itin rizikingus aktyvus (pvz. KriptoImpulsas) laikyti nedidele dalimi arba visai vengti — nes lieka mažai laiko atsigauti po galimo kritimo. Tai tiesiogiai remiasi tuo, ką išmokote apie rizikos toleranciją ir laiko horizontą.`
        : '';

      document.getElementById('allocFeedback').innerHTML = `<div class="feedback-box"><b>Įvertintas portfelio volatilumas:</b> ${(weightedVol*100).toFixed(1)}%<br><b>Galimas dienos svyravimas:</b> apytiksliai ±${fmt(swingEuros)}<br><b>Didžiausia koncentracija viename aktyve:</b> ${maxAlloc}%<br><br>${verdict}${closingNote}</div>
        <button class="continue-btn" id="finishBtn">Baigti modulį →</button>`;
      document.getElementById('finishBtn').addEventListener('click', () => {
        progress[moduleId].practice.done = true;
        saveProgress();
        view = {name:'certificate', moduleId};
        render();
      });
    });
  }
  draw();
}

/* ============ SIMULATOR PRACTICE (M8) ============ */

let sim = null;
function simGaussianRandom(){ return (Math.random()+Math.random()+Math.random()-1.5)/1.5; }
function simTotalValue(){ let v=sim.cash; sim.companies.forEach(c=>v+=(sim.holdings[c.id]||0)*c.price); return v; }

function renderPracticeSimulator(main, moduleId, practice){
  if(!sim){
    const cumPct = (function(){
      const doneVals = BUILT_CHAIN.filter(id => id!==moduleId && moduleFullyDone(id)).map(id => moduleStipendija(id));
      if(doneVals.length===0) return 0;
      const r = capitalRange();
      return Math.round(((doneVals.reduce((a,b)=>a+b,0)/doneVals.length) - r.base) / r.bonus * 100);
    })();
    const r = capitalRange();
    const startCash = Math.round(r.base + (cumPct/100)*r.bonus);
    sim = { day:1, maxDays:20, cash:startCash, startCash,
      companies: JSON.parse(JSON.stringify(SIM_COMPANIES)).map(c=>({...c, history:[c.price]})),
      holdings:{}, lastTip:-1 };
    SIM_COMPANIES.forEach(c => sim.holdings[c.id]=0);
  }
  main.innerHTML = `<div class="back-link" id="backBtn">← Atgal į modulį</div>
    <div class="page-title">🏁 ${practice.label}</div>
    <p style="color:var(--muted);font-size:12.5px;margin:8px 0 14px;">Pradinis kapitalas priklauso nuo visos kurso stipendijos: <b style="color:var(--gold);">${fmt(sim.startCash)}</b></p>
    <div class="ticker-wrap"><div class="ticker" id="simTicker"></div></div>
    <div class="sim-stats"><span>Diena <b id="simDay">1</b>/20</span><span>Grynieji: <b id="simCash"></b></span><span>Portfelio vertė: <b id="simTotal"></b></span><button id="nextDayBtn">Kita diena →</button></div>
    <div class="sim-grid"><div id="simStocks"></div><div><div class="side-panel"><h4>Rinkos naujienos</h4><div id="newsFeedSim"></div></div><div class="side-panel"><h4>Mano portfelis</h4><div id="simHoldings"></div></div></div></div>
    <div id="simEnd"></div>`;
  document.getElementById('backBtn').addEventListener('click', () => { view={name:'module', moduleId}; render(); });
  document.getElementById('nextDayBtn').addEventListener('click', simNextDay);
  simRenderAll();
}
function simPushNews(text,isTip){ const feed=document.getElementById('newsFeedSim'); if(!feed) return; const item=document.createElement('div'); item.className='news-item'; item.innerHTML = isTip?`<span class="tip">💡</span> ${text}`:`<b>D${sim.day}:</b> ${text}`; feed.prepend(item); while(feed.children.length>10) feed.removeChild(feed.lastChild); }
function simRenderTicker(){ const track=document.getElementById('simTicker'); if(!track) return; let html=''; sim.companies.forEach(c=>{ const prev=c.history.length>1?c.history[c.history.length-2]:c.price; const chg=((c.price-prev)/prev*100); const cls=chg>=0?'up':'down'; html+=`<span>${c.name} <b class="${cls}">${c.price.toFixed(2)} ${chg>=0?'▲':'▼'} ${Math.abs(chg).toFixed(1)}%</b></span>`; }); track.innerHTML=html+html; }
function simSparkline(history){ const w=80,h=30; const min=Math.min(...history),max=Math.max(...history); const range=(max-min)||1; const pts=history.map((v,i)=>{ const x=(i/(history.length-1||1))*w; const y=h-((v-min)/range)*h; return `${x.toFixed(1)},${y.toFixed(1)}`; }).join(' '); const color=history[history.length-1]>=history[0]?'#3FA796':'#C1553B'; return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/></svg>`; }
function simRenderStocks(){ const list=document.getElementById('simStocks'); if(!list) return; list.innerHTML=''; sim.companies.forEach(c=>{ const prev=c.history.length>1?c.history[c.history.length-2]:c.price; const chg=((c.price-prev)/prev*100); const cls=chg>=0?'up':'down'; const owned=sim.holdings[c.id]||0; const card=document.createElement('div'); card.className='stock-card'; card.innerHTML=`<div class="stock-head"><div><div class="stock-name">${c.name}</div><div class="stock-sector">${c.sector}</div></div><div><div class="stock-price">${c.price.toFixed(2)}</div><div class="stock-change ${cls}">${chg>=0?'+':''}${chg.toFixed(1)}%</div></div></div><div class="stock-body">${simSparkline(c.history)}<div class="stock-desc">${c.desc}</div></div><div class="stock-controls"><input type="number" min="1" value="1" id="simqty-${c.id}"><button class="btn btn-buy" data-a="buy" data-id="${c.id}">Pirkti</button><button class="btn btn-sell" data-a="sell" data-id="${c.id}" ${owned===0?'disabled':''}>Parduoti</button><span class="owned-tag">Turite: ${owned}</span></div>`; list.appendChild(card); }); list.querySelectorAll('button[data-a]').forEach(btn=>{ btn.addEventListener('click', ()=>{ const id=btn.dataset.id, qty=Math.max(1,parseInt(document.getElementById('simqty-'+id).value)||1); if(btn.dataset.a==='buy') simBuy(id,qty); else simSell(id,qty); }); }); }
function simBuy(id,qty){ const c=sim.companies.find(c=>c.id===id); const cost=c.price*qty; if(sim.cash<cost){ simPushNews(`Nepakanka grynųjų pirkti ${qty} vnt. ${c.name}.`); return; } sim.cash-=cost; sim.holdings[id]=(sim.holdings[id]||0)+qty; simRenderAll(); }
function simSell(id,qty){ const c=sim.companies.find(c=>c.id===id); const owned=sim.holdings[id]||0; const q=Math.min(qty,owned); if(q<=0) return; sim.cash+=c.price*q; sim.holdings[id]-=q; simRenderAll(); }
function simRenderHoldings(){ const div=document.getElementById('simHoldings'); if(!div) return; const owned=sim.companies.filter(c=>(sim.holdings[c.id]||0)>0); if(owned.length===0){ div.innerHTML='<div style="font-size:11px;color:var(--muted);font-style:italic;">Kol kas jokių akcijų neturite.</div>'; return; } div.innerHTML=owned.map(c=>{ const qty=sim.holdings[c.id]; return `<div class="holding-row"><span>${c.name} × ${qty}</span><span>${fmt(qty*c.price)}</span></div>`; }).join(''); }
function simRenderAll(){ simRenderTicker(); simRenderStocks(); simRenderHoldings(); const dEl=document.getElementById('simDay'); if(dEl) dEl.textContent=sim.day; const cEl=document.getElementById('simCash'); if(cEl) cEl.textContent=fmt(sim.cash); const tEl=document.getElementById('simTotal'); if(tEl) tEl.textContent=fmt(simTotalValue()); }
function simNextDay(){
  let ev=null;
  if(Math.random()<0.35){ const c=SIM_EVENTS.filter(e=>!e.market); ev=c[Math.floor(Math.random()*c.length)]; }
  else if(Math.random()<0.15){ const c=SIM_EVENTS.filter(e=>e.market); ev=c[Math.floor(Math.random()*c.length)]; }
  sim.companies.forEach(c=>{ let ret=c.drift+simGaussianRandom()*c.vol; if(ev&&(ev.market||ev.companyId===c.id)) ret+=(ev.mult-1); c.price=Math.max(0.5,c.price*(1+ret)); c.history.push(c.price); if(c.history.length>20) c.history.shift(); });
  if(ev) simPushNews(ev.text);
  let ti; do{ ti=Math.floor(Math.random()*SIM_TIPS.length); }while(ti===sim.lastTip && SIM_TIPS.length>1);
  sim.lastTip=ti; simPushNews(SIM_TIPS[ti], true);
  sim.day++;
  if(sim.day>sim.maxDays){ simRenderAll(); const btn=document.getElementById('nextDayBtn'); if(btn) btn.disabled=true; simShowEnd(); } else { simRenderAll(); }
}
function simShowEnd(){
  const moduleId = 'm8';
  const finalValue=simTotalValue();
  const returnPct=((finalValue-sim.startCash)/sim.startCash*100);
  const numHeld=sim.companies.filter(c=>(sim.holdings[c.id]||0)>0).length;
  let rating;
  if(returnPct>25 && numHeld<=1) rating='Rizikingas spekuliantas — dideli laimėjimai, bet be diversifikacijos apsaugos.';
  else if(returnPct>15 && numHeld>=2) rating='Apgalvotas augimo investuotojas — geras balansas tarp rizikos ir grąžos.';
  else if(returnPct>=0 && numHeld>=3) rating='Atsargus diversifikuotojas — stabilus, saugus požiūris.';
  else if(returnPct<0) rating='Sunkus rinkos periodas — pasimokykite ir bandykite kitaip.';
  else rating='Vidutinis investuotojas — yra kur tobulėti.';
  document.getElementById('simEnd').innerHTML = `<div class="feedback-box" style="margin-top:14px;"><b>Rezultatas:</b> ${fmt(finalValue)} (${returnPct>=0?'+':''}${returnPct.toFixed(1)}%)<br>${rating}</div>
    <button class="continue-btn" id="finBtn">Gauti diplomą →</button>`;
  document.getElementById('finBtn').addEventListener('click', () => {
    progress[moduleId].practice.done = true;
    saveProgress();
    view = {name:'certificate', moduleId};
    render();
  });
}

/* ============ TRANSCRIPT ============ */

function renderTranscript(main){
  let html = `<div class="page-title">Pažymių knygelė</div><div class="page-sub">Visi jūsų rezultatai vienoje vietoje.</div>`;
  if(meta.preTestScore !== null){
    html += `<div class="stipendija-breakdown">📋 Pradinis žinių testas: <b>${meta.preTestScore}%</b></div>`;
  }
  html += `<table class="transcript"><thead><tr><th>Modulis / Tema</th><th>Rezultatas</th></tr></thead><tbody>`;
  const badges = [];
  PLANNED_MODULES.forEach(m => {
    if(!m.built){
      html += `<tr><td colspan="2" style="color:var(--muted);font-weight:600;padding-top:14px;">${m.title} — ruošiama</td></tr>`;
      return;
    }
    html += `<tr><td colspan="2" style="color:var(--gold);font-weight:600;padding-top:14px;">${m.title}</td></tr>`;
    MODULE_CONTENT[m.id].topics.forEach(t => {
      const tp = progress[m.id].topics[t.id];
      html += `<tr><td>${t.title}</td><td class="score-cell">${tp.bestScore !== null ? tp.bestScore+'%' : '—'}</td></tr>`;
    });
    MODULE_CONTENT[m.id].caseStudies.forEach((cs, idx) => {
      const csProg = progress[m.id].caseStudies[idx];
      html += `<tr><td>${cs.title}</td><td class="score-cell">${csProg.done ? csProg.score+'%' : '—'}</td></tr>`;
    });
    html += `<tr><td>Praktika</td><td class="score-cell">${progress[m.id].practice.done ? 'Baigta' : '—'}</td></tr>`;
    html += `<tr><td><b>Modulio vidurkis</b></td><td class="score-cell"><b>${Math.round(topicsAvg(m.id))}%</b></td></tr>`;
    if(moduleFullyDone(m.id)) badges.push({icon:'🏅', name:m.badgeName});
    if(topicsAvg(m.id) === 100 && allTopicsDone(m.id)) badges.push({icon:'🌟', name:'Tobulas mokinys („'+m.title+'“)'});
  });
  html += `</tbody></table>`;
  html += `<div class="badge-row">${badges.length ? badges.map(b=>`<div class="badge-chip">${b.icon} ${b.name}</div>`).join('') : '<span style="color:var(--muted);font-size:12.5px;">Kol kas ženklelių nėra — baikite modulį, kad juos gautumėte.</span>'}</div>`;
  main.innerHTML = html;
}

/* ============ CERTIFICATE ============ */

function renderCertificate(main){
  const moduleId = view.moduleId;
  const m = PLANNED_MODULES.find(x => x.id === moduleId);
  const avgScore = Math.round(topicsAvg(moduleId));
  const compareHtml = meta.preTestScore !== null
    ? `<div style="color:var(--muted);font-size:12.5px;margin-top:10px;">Pradinis žinių testas: ${meta.preTestScore}% → Šio modulio vidurkis: ${avgScore}% (${avgScore-meta.preTestScore>=0?'+':''}${avgScore-meta.preTestScore} p.p.)</div>`
    : '';

  if(meta.mode === 'browse'){
    main.innerHTML = `<div class="certificate">
      <h2>✓ Peržiūra baigta</h2>
      <div class="cert-box" style="border-width:1px;">
        <div class="cname" style="font-size:20px;">${m.title}</div>
        <div style="color:var(--muted);font-size:13px;">Peržiūrėjote šį modulį su ${avgScore}% vidutiniu rezultatu.</div>
        ${compareHtml}
      </div>
      <button class="continue-btn" id="backHomeBtn">Grįžti į silabusą</button>
    </div>`;
    document.getElementById('backHomeBtn').addEventListener('click', () => { view={name:'syllabus'}; render(); });
    return;
  }

  main.innerHTML = `
    <div class="certificate" id="certWrap">
      <h2>🎓 Sveikiname!</h2>
      <div class="cert-box">
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;">INVESTAVIMO AKADEMIJA</div>
        <div class="cname">${m.title}</div>
        <div style="color:var(--muted);font-size:13px;">Sėkmingai užbaigta su ${avgScore}% vidutiniu rezultatu</div>
        ${compareHtml}
        <div style="margin-top:14px;font-size:12.5px;color:var(--gold);">${m.icon} Ženklelis: ${m.badgeName}</div>
      </div>
      <button class="continue-btn" id="backHomeBtn">Grįžti į silabusą</button>
    </div>`;
  document.getElementById('backHomeBtn').addEventListener('click', () => { view={name:'syllabus'}; render(); });

  const colors = ['#D9A441','#3FA796','#C1553B','#EDEAE0'];
  const wrap = document.getElementById('certWrap');
  for(let i=0;i<60;i++){
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random()*100 + '%';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (2 + Math.random()*2) + 's';
    el.style.animationDelay = (Math.random()*0.8) + 's';
    wrap.appendChild(el);
  }
}

(async function(){
  await initFirebase();
  await loadProgress();
  render();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.error('SW registracija nepavyko:', e));
  });
}
</script>
